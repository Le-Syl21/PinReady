inputs_profile_none = "None"
rendering_show_fps = "Show FPS"
rendering_show_fps_hint = "Show the in-game FPS counter (recommended)"
inputs_unmap_keyboard = "Revert to the default key"
inputs_unmap_joystick = "Remove the joystick button"
rendering_sync_none = "No sync"
rendering_sync_none_hint = "No frame synchronisation — lowest input latency, but the image can tear and the GPU runs uncapped (more heat)."
rendering_sync_vsync_hint = "Locks frames to the display refresh: no tearing, at the cost of higher input latency."
rendering_sync_adaptive = "Adaptive sync"
rendering_sync_adaptive_hint = "V-sync while frames keep up with the target FPS; sync is dropped only for late frames, to avoid a hard stutter."
rendering_sync_framepacing = "Frame pacing"
rendering_sync_framepacing_hint = "VPX's default: spaces frames evenly for the smoothest motion with low latency. Recommended when the compositor allows it."
rendering_ball_round = "Round ball"
rendering_ball_round_hint = "Keep the ball round"
rendering_ball_round_tip = "Compensates the render stretch that makes the ball look slightly egg-shaped in fast motion on some tables. Cosmetic only, no gameplay effect."

system_mirror_clear_hint = "Clears the self-hosted mirror URL and restores direct GitHub downloads. Use this if the mirror is offline or you no longer run one."
inputs_pinscape_profile_hint = "Pick the profile matching your pinball controller board (KL25Z, Pico, DudesCab or PinOne). It fills the joystick column with that board's factory button layout. Choose None to clear those defaults and map every button yourself."
inputs_gamepad_hint = "Enable this to use the detected gamepad for navigating PinReady and for in-game actions. Turn it off if you only play with a keyboard or a dedicated pinball controller."
inputs_auto_map_hint = "Walk through every action one by one: press the key or controller button you want for each. Fastest way to set up all your controls in a single pass."
inputs_auto_map_skip_hint = "Keep this action's current binding unchanged and move on to the next one."
inputs_auto_map_cancel_hint = "Stop the guided mapping now. Bindings already captured in this pass are kept."
inputs_map_hint = "Click, then press a key or controller button to bind it to this action. A key fills the keyboard column, a controller button fills the joystick column; both can coexist."
rendering_aa_hint = "Supersampling renders the table at a higher internal resolution and scales it down, smoothing jagged edges. Above 1.0 sharpens the image at a GPU cost; below 1.0 boosts framerate on weaker machines."
rendering_msaa_hint = "Multisample anti-aliasing smooths geometry edges like ramps and wireforms. Higher values look cleaner but cost more GPU; leave it off if supersampling or FXAA already handles aliasing."
rendering_fxaa_hint = "Post-process anti-aliasing smooths the whole image after rendering, very cheap on the GPU. Stronger modes soften more edges but can slightly blur the playfield; a good choice on low-end hardware."
rendering_sharpen_hint = "Sharpening counteracts the softening caused by anti-aliasing or supersampling, making inserts and text crisper. Enable it if the image looks slightly blurry; leave it off if it already looks sharp."
rendering_reflections_hint = "Controls what the playfield reflects: the ball, static parts, or dynamic objects. More reflections look richer but cost GPU; reduce this if the framerate drops on busy tables."
rendering_tex_size_hint = "Caps the maximum texture resolution VPX loads. The default (16384) keeps full detail; lower it only if a GPU with limited video memory runs out of memory or stutters."
audio_device_bg_hint = "Sound card or speakers used for music, callouts and general game sounds (the backglass side). Leave on default unless you route these to a separate output."
audio_device_pf_hint = "Sound card or speakers used for mechanical playfield sounds (flippers, bumpers, ball rolls). For surround or SSF this must be the multi-channel output."
audio_mode_front_stereo_hint = "Plain stereo with both speakers in front of the cabinet. The simplest setup, with no spatial effects."
audio_mode_rear_stereo_hint = "Plain stereo with the two speakers behind the playfield, near the lockbar. Use this if your only speakers sit close to the player."
audio_mode_surround_rear_hint = "5.1 surround with the rear channels placed at the lockbar. Requires a 6-channel sound card."
audio_mode_surround_front_hint = "5.1 surround with the front channels placed at the lockbar. Pick whichever matches how your speakers are physically wired."
audio_mode_ssf_legacy_hint = "Surround Sound Feedback with the older mixing. SSF uses playfield exciters so sounds feel like they come from the ball; try the New variant first."
audio_mode_ssf_new_hint = "Surround Sound Feedback with the newer, recommended mixing. Best immersion on a full SSF cabinet with 7.1 exciters."
audio_music_volume_hint = "Overall level of music, callouts and game sounds on the backglass output (VPX MusicVolume)."
audio_sound_volume_hint = "Level of the mechanical playfield sounds on the playfield output (VPX SoundVolume)."
audio_test_music_btn_hint = "Plays a looping music track on the backglass device so you can check it is audible and wired left/right correctly."
audio_pan_hint = "Drag to shift the test music between the left and right backglass speakers, confirming they are not swapped."
audio_speaker_test_hint = "Plays a test sound on this speaker only, so you can confirm it is wired to the matching corner of the cabinet."
audio_ball_top_bottom_hint = "Sweeps a rolling-ball sound from the front speakers to the lockbar. If the motion feels reversed, switch the output mode above."
audio_ball_left_right_hint = "Sweeps a rolling-ball sound from the left speakers to the right. If the direction is wrong, check your left/right wiring."
outputs_open_folder_hint = "Opens the folder where DOF looks for its configuration. Extract the zip from the generator here, then restart VPX so it picks up the config."
outputs_dof_disable_hint = "Turns the DOF plugin back off in VPinballX.ini. Your solenoids, flashers and shakers will stop reacting in-game."
outputs_dof_activate_hint = "Writes Enable = 1 for the DOF plugin so VPX drives your output hardware. Only useful once your DOF config has been generated and extracted."
outputs_discover_ack_hint = "Confirms you understand the test physically fires solenoids and motors. Check it to unlock the scan and simulator buttons."
outputs_discover_scan_hint = "Looks for connected output controllers (Pinscape, etc.) over USB so you can pulse their outputs one by one."
outputs_discover_simulator_hint = "Runs the discovery flow against a fake 22-output board. A safe way to try the interface with no hardware attached."
outputs_discover_start_hardware_hint = "Opens the detected board and starts pulsing its outputs so you can note which pin drives which device on the cabinet."
outputs_discover_copy_udev_hint = "Copies the udev rules to the clipboard so you can paste them into a rules file for non-root HID access."
outputs_discover_pulse_stop_hint = "Stops the automatic pulsing loop on the current output."
outputs_discover_pulse_start_hint = "Repeatedly pulses the selected output so you can spot which device it triggers on the cabinet."
outputs_discover_replay_hint = "Restarts the pulsing loop on the current output if you missed which device reacted."
outputs_discover_prev_hint = "Moves back to the previous output number to test and label it."
outputs_discover_next_hint = "Moves on to the next output number to test and label it."
outputs_discover_label_hint = "Name the device wired to this output (e.g. Left Flipper, Shaker). These labels build the summary you paste into the DOF generator."
outputs_discover_copy_hint = "Copies the numbered list of your labelled outputs to the clipboard, as a reference while filling in configtool.vpuniverse.com."
outputs_discover_end_session_hint = "Ends the discovery session and clears the current output labels. Copy the summary first if you still need it."
screens_language_hint = "Interface language for PinReady. This does not change Visual Pinball's own language."
screens_vpx_auto_hint = "Download and install the latest Visual Pinball X build automatically. Recommended if you don't already have VPX installed."
screens_vpx_install_button_hint = "Download the version shown above and install it into the folder below."
screens_vpx_browse_dir_hint = "Choose the folder where Visual Pinball X will be installed."
screens_vpx_manual_hint = "Use a Visual Pinball X you already installed yourself instead of downloading one."
screens_vpx_exe_hint = "Path to your existing VPinballX_BGFX executable."
screens_vpx_browse_exe_hint = "Locate the VPinballX_BGFX executable on your disk."
screens_count_hint = "How many displays your setup uses. A desktop is usually 1; a full pincab is 3 or 4 (playfield, backglass, DMD, and an optional topper)."
screens_mode_desktop_hint = "Single-screen view for a regular desktop monitor. The table is shown from a standard front angle."
screens_mode_cabinet_hint = "Cabinet view for a real pincab: the playfield is rendered for a screen laid flat, with backglass and DMD on separate displays."
screens_mode_fss_hint = "Full Single Screen: playfield and backglass stacked on one tall screen. Use it when you have a single portrait display."
screens_disable_touch_hint = "Turn off VPX's on-screen touch overlay. Enable this on a pincab whose playfield is a non-touch screen."
screens_physical_size_hint = "Physical width and height of this screen in millimetres. VPX uses it to scale the table to life size; auto-filled from the monitor's EDID when available."
screens_role_hint = "What this screen shows in VPX: Playfield, Backglass, DMD or Topper. Leave it as Unused to ignore the display."
screens_cab_lockbar_width_hint = "Width of the cabinet lockbar (the front rail). Used to scale the on-screen ball to your cabinet's real size."
screens_cab_lockbar_height_hint = "Height of the lockbar above the floor. Combined with your eye height, it sets the viewing angle onto the playfield."
screens_cab_inclination_hint = "Tilt angle of the playfield screen. Match it to the real slope of your cabinet's playfield glass."
screens_cab_player_height_hint = "Your standing height. Used to compute your eye position for a correct perspective."
screens_cab_player_distance_hint = "How far you stand from the lockbar (front-to-back). Negative is behind the lockbar, positive is leaning over it."
screens_cab_player_offset_hint = "Your left/right offset from the cabinet centre. Leave at 0 unless you stand off to one side."
tables_dir_path_hint = "Root folder that holds one subfolder per table (VPX 10.8 folder-per-table layout). PinReady scans it to build your table list."
tables_dir_browse_hint = "Open a folder picker to choose your tables directory instead of typing the path by hand."
tables_dir_merge_vpinmame_hint = "Existing VPinMAME folder (roms, nvram, cfg…). Its files are imported into each matching table's pinmame folder. Leave empty if you have none."
tables_dir_merge_pupvideos_hint = "Existing PinUP Player pupvideos folder. Matching videos are imported into each table's pupvideos folder. Leave empty if unused."
tables_dir_merge_music_hint = "Existing music folder. Matching tracks are imported into each table's music folder. Leave empty if unused."
tables_dir_merge_strategy_copy_hint = "Duplicates the source files into your tables directory and keeps the originals. Safest choice, but uses the most disk space."
tables_dir_merge_strategy_move_hint = "Moves the files into your tables directory and removes them from the source. Saves disk space but empties the original folders."
tables_dir_merge_strategy_symlink_hint = "Creates links pointing at the originals instead of copying. Uses almost no disk space, but the source folders must stay in place."
tables_dir_merge_dry_run_hint = "Scans the sources and lists what would be imported, without changing any files. Run this first to preview the result."
tables_dir_merge_apply_hint = "Performs the import for real, using the plan from the dry run. Files are copied, moved or linked according to your chosen strategy."
tables_dir_merge_cancel_hint = "Stops the import currently in progress. Files already imported are kept."
