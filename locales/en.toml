# Rescan hint (tables page)
tables_rebuild_title = "Rebuild button (in table launcher)"
tables_rebuild_desc = "Click to wipe every cached backglass image and VBS-patch state, then re-scan the tables directory from scratch. Use this when PinReady seems out of sync with your disk — after reorganizing tables, or to pick up a freshly released Le-Syl21 catalog patch."
tables_vbs_patch_title = "Visual Pinball Standalone compatibility"
tables_vbs_patch_desc = "Some tables use Windows-only VBScript APIs that break on the Linux/macOS Standalone build. When the option below is enabled, PinReady fingerprints each table's embedded VBS at scan time and — when the community project Le-Syl21/vpx-standalone-scripts has a patch for it — installs the patched script as a .vbs sidecar next to the .vpx."
tables_vbs_patch_toggle = "Auto-apply VBS patches from Le-Syl21/vpx-standalone-scripts"
tables_vbs_patch_backup = "If you had your own customized <table>.vbs sidecar, it is preserved as <table>.pre_standalone.vbs (VPX won't auto-load that filename) before the patch is applied — a working table, with your old script safely backed up. Off by default: the catalog occasionally ships patches that regress specific tables, so enable it deliberately."

tables_catalog_title = "Catalog enrichment (VPSDB + VPinMediaDB)"
tables_catalog_desc = "Match each installed table against the Virtual Pinball Spreadsheet catalog (~2500 games) and download backglass (bg.png) + audio jingle (audio.mp3) from VPinMediaDB into <table>/medias/. First sync transfers ~7 MB of catalog JSON plus a few MB per matched table. Required for hover preview and update-available badges in the launcher grid. On by default — opt out here on metered or offline pincabs."
tables_catalog_toggle = "Auto-sync VPSDB + VPinMediaDB at scan time"

