# Rebuild button + VBS patch explainer (tables page)
tables_rebuild_title = "পুনর্নির্মাণ বোতাম (টেবিল লঞ্চারে)"
tables_rebuild_desc = "প্রতিটি ক্যাশে করা ব্যাকগ্লাস ছবি এবং VBS-প্যাচ অবস্থা মুছতে ক্লিক করুন, তারপর টেবিল ডিরেক্টরি নতুন করে স্ক্যান করুন। যখন PinReady আপনার ডিস্কের সাথে সিঙ্ক থাকে না বলে মনে হয় তখন এটি ব্যবহার করুন — টেবিল পুনর্বিন্যাস করার পরে, বা সদ্য প্রকাশিত Le-Syl21 প্যাচ গ্রহণ করতে।"
tables_vbs_patch_title = "Visual Pinball Standalone সামঞ্জস্যতা"
tables_vbs_patch_desc = "কিছু টেবিল Windows-এর জন্য বিশেষ VBScript API ব্যবহার করে যা Linux/macOS Standalone বিল্ডে কাজ করে না। নিচের বিকল্পটি সক্রিয় থাকলে, PinReady স্ক্যান করার সময় প্রতিটি টেবিলের এম্বেডেড VBS-এর ফিঙ্গারপ্রিন্ট তৈরি করে এবং — যখন কমিউনিটি প্রকল্প Le-Syl21/vpx-standalone-scripts-এ এর জন্য একটি প্যাচ থাকে — .vpx ফাইলের পাশে একটি .vbs সাইডকার হিসাবে প্যাচ করা স্ক্রিপ্ট ইনস্টল করে।"
