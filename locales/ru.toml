screens_language_hint = "Язык интерфейса PinReady. Это не меняет язык самого Visual Pinball."
screens_vpx_auto_hint = "Автоматически скачать и установить последнюю сборку Visual Pinball X. Рекомендуется, если у вас ещё не установлен VPX."
screens_vpx_install_button_hint = "Скачать версию, указанную выше, и установить её в папку ниже."
screens_vpx_browse_dir_hint = "Выберите папку, в которую будет установлен Visual Pinball X."
screens_vpx_manual_hint = "Использовать уже установленный вами Visual Pinball X вместо загрузки нового."
screens_vpx_exe_hint = "Путь к вашему существующему исполняемому файлу VPinballX_BGFX."
screens_vpx_browse_exe_hint = "Найдите исполняемый файл VPinballX_BGFX на вашем диске."
screens_count_hint = "Сколько экранов использует ваша установка. У настольного ПК обычно 1; у полного пинкаба — 3 или 4 (игровое поле, backglass, DMD и опциональный топпер)."
screens_mode_desktop_hint = "Одноэкранный режим для обычного настольного монитора. Стол показан под стандартным фронтальным углом."
screens_mode_cabinet_hint = "Режим кабинета для настоящего пинкаба: игровое поле отрисовывается для экрана, лежащего плашмя, а backglass и DMD — на отдельных дисплеях."
screens_mode_fss_hint = "Full Single Screen: игровое поле и backglass, наложенные друг на друга на одном высоком экране. Используйте, когда у вас один дисплей в портретной ориентации."
screens_disable_touch_hint = "Отключает сенсорный оверлей, отображаемый VPX. Включите эту опцию, если экран вашего автомата не сенсорный — и особенно если вы управляете машиной удалённо (RustDesk, VNC, TeamViewer…): удалённый указатель иначе может быть принят за касание и вызвать случайные действия в VPX."
screens_physical_size_hint = "Физическая ширина и высота этого экрана в миллиметрах. VPX использует их для масштабирования стола до натуральной величины; заполняется автоматически из EDID монитора, если доступно."
screens_role_hint = "Что этот экран показывает в VPX: игровое поле, backglass, DMD или топпер. Оставьте «Не используется», чтобы игнорировать дисплей."
screens_cab_lockbar_width_hint = "Ширина lockbar кабинета (передней планки). Используется для масштабирования отображаемого шара под реальный размер вашего кабинета."
screens_cab_lockbar_height_hint = "Высота lockbar над полом. В сочетании с высотой ваших глаз задаёт угол обзора на игровое поле."
screens_cab_inclination_hint = "Угол наклона экрана игрового поля. Настройте его под реальный наклон стекла игрового поля вашего кабинета."
screens_cab_player_height_hint = "Ваш рост стоя. Используется для вычисления положения ваших глаз для корректной перспективы."
screens_cab_player_distance_hint = "Насколько далеко вы стоите от lockbar (спереди назад). Отрицательное значение — за lockbar, положительное — наклонившись над ней."
screens_cab_player_offset_hint = "Ваше смещение влево/вправо относительно центра кабинета. Оставьте 0, если только вы не стоите сбоку."
rendering_aa_hint = "Суперсэмплинг рендерит стол во внутреннем разрешении повыше и уменьшает его, сглаживая зубчатые края. Выше 1.0 повышает резкость изображения ценой нагрузки на GPU; ниже 1.0 увеличивает частоту кадров на слабых машинах."
rendering_msaa_hint = "Мультисэмпловое сглаживание MSAA сглаживает края геометрии, такие как рампы и проволочные формы. Более высокие значения выглядят чище, но сильнее нагружают GPU; оставьте выключенным, если суперсэмплинг или FXAA уже справляется со сглаживанием."
rendering_fxaa_hint = "Постобработочное сглаживание сглаживает всё изображение после рендеринга, очень дёшево для GPU. Более сильные режимы сглаживают больше краёв, но могут слегка размыть игровое поле; хороший выбор для слабого железа."
rendering_sharpen_hint = "Повышение резкости компенсирует размытие, вызванное сглаживанием или суперсэмплингом, делая вставки и текст чётче. Включите, если изображение выглядит слегка размытым; оставьте выключенным, если оно уже чёткое."
rendering_reflections_hint = "Определяет, что отражает игровое поле: шар, статичные части или динамические объекты. Больше отражений выглядит богаче, но нагружает GPU; уменьшите это, если частота кадров падает на насыщенных столах."
rendering_tex_size_hint = "Ограничивает максимальное разрешение текстур, загружаемых VPX. Значение по умолчанию (16384) сохраняет полную детализацию; понижайте его только если GPU с ограниченной видеопамятью исчерпывает память или подтормаживает."
inputs_pinscape_profile_hint = "Выберите профиль, соответствующий вашей плате контроллера пинбола (KL25Z, Pico, DudesCab или PinOne). Он заполняет столбец джойстика заводской раскладкой кнопок этой платы. Выберите «Нет», чтобы очистить эти значения по умолчанию и назначить каждую кнопку самостоятельно."
inputs_gamepad_hint = "Включите это, чтобы использовать обнаруженный геймпад для навигации по PinReady и для действий в игре. Отключите, если вы играете только на клавиатуре или с выделенным контроллером пинбола."
inputs_auto_map_hint = "Пройдите по каждому действию по очереди: нажмите клавишу или кнопку контроллера, которую хотите назначить для каждого. Самый быстрый способ настроить все ваши элементы управления за один проход."
inputs_auto_map_skip_hint = "Оставить текущую привязку этого действия без изменений и перейти к следующему."
inputs_auto_map_cancel_hint = "Остановить управляемое назначение сейчас. Привязки, уже захваченные в этом проходе, сохраняются."
inputs_map_hint = "Нажмите, затем нажмите клавишу или кнопку контроллера, чтобы привязать её к этому действию. Клавиша заполняет столбец клавиатуры, кнопка контроллера заполняет столбец джойстика; оба могут сосуществовать."
outputs_open_folder_hint = "Открывает папку, в которой DOF ищет свою конфигурацию. Распакуйте сюда zip из генератора, затем перезапустите VPX, чтобы он подхватил конфигурацию."
outputs_dof_disable_hint = "Снова отключает плагин DOF в VPinballX.ini. Ваши соленоиды, флешеры и шейкеры перестанут реагировать в игре."
outputs_dof_activate_hint = "Записывает Enable = 1 для плагина DOF, чтобы VPX управлял вашим выходным оборудованием. Полезно только после того, как ваша конфигурация DOF сгенерирована и распакована."
outputs_discover_ack_hint = "Подтверждает, что вы понимаете, что тест физически активирует соленоиды и моторы. Отметьте, чтобы разблокировать кнопки сканирования и симулятора."
outputs_discover_scan_hint = "Ищет подключённые контроллеры выходов (Pinscape и т.п.) через USB, чтобы вы могли поочерёдно активировать их выходы."
outputs_discover_simulator_hint = "Запускает процесс обнаружения на фиктивной плате с 22 выходами. Безопасный способ опробовать интерфейс без подключённого оборудования."
outputs_discover_start_hardware_hint = "Открывает обнаруженную плату и начинает активировать её выходы, чтобы вы могли отметить, какой контакт управляет каким устройством на кабинете."
outputs_discover_copy_udev_hint = "Копирует правила udev в буфер обмена, чтобы вы могли вставить их в файл правил для доступа к HID без прав root."
outputs_discover_pulse_stop_hint = "Останавливает цикл автоматической активации на текущем выходе."
outputs_discover_pulse_start_hint = "Повторно активирует выбранный выход, чтобы вы могли определить, какое устройство он запускает на кабинете."
outputs_discover_replay_hint = "Перезапускает цикл активации на текущем выходе, если вы упустили, какое устройство отреагировало."
outputs_discover_prev_hint = "Возвращается к предыдущему номеру выхода, чтобы протестировать и пометить его."
outputs_discover_next_hint = "Переходит к следующему номеру выхода, чтобы протестировать и пометить его."
outputs_discover_label_hint = "Назовите устройство, подключённое к этому выходу (например, Левый флиппер, Шейкер). Эти метки формируют сводку, которую вы вставляете в генератор DOF."
outputs_discover_copy_hint = "Копирует пронумерованный список ваших помеченных выходов в буфер обмена как справку при заполнении configtool.vpuniverse.com."
outputs_discover_end_session_hint = "Завершает сессию обнаружения и очищает текущие метки выходов. Сначала скопируйте сводку, если она вам ещё нужна."
audio_device_bg_hint = "Звуковая карта или динамики, используемые для музыки, объявлений и общих звуков игры (сторона backglass). Оставьте по умолчанию, если только вы не направляете эти звуки на отдельный выход."
audio_device_pf_hint = "Звуковая карта или динамики, используемые для механических звуков игрового поля (флипперы, бамперы, качение шара). Для surround или SSF это должен быть многоканальный выход."
audio_mode_front_stereo_hint = "Обычное стерео с обоими динамиками спереди кабинета. Самая простая настройка, без пространственных эффектов."
audio_mode_rear_stereo_hint = "Обычное стерео с двумя динамиками за игровым полем, рядом с lockbar. Используйте, если ваши единственные динамики расположены близко к игроку."
audio_mode_surround_rear_hint = "Surround 5.1 с тыловыми каналами, размещёнными у lockbar. Требуется 6-канальная звуковая карта."
audio_mode_surround_front_hint = "Surround 5.1 с фронтальными каналами, размещёнными у lockbar. Выберите тот вариант, который соответствует физическому подключению ваших динамиков."
audio_mode_ssf_legacy_hint = "Surround Sound Feedback со старым микшированием. SSF использует эксайтеры игрового поля, чтобы звуки казались исходящими от шара; сначала попробуйте вариант «Новый»."
audio_mode_ssf_new_hint = "Surround Sound Feedback с более новым, рекомендуемым микшированием. Лучшее погружение на полном SSF-кабинете с эксайтерами 7.1."
audio_music_volume_hint = "Общий уровень музыки, объявлений и звуков игры на выходе backglass (VPX MusicVolume)."
audio_sound_volume_hint = "Уровень механических звуков игрового поля на выходе игрового поля (VPX SoundVolume)."
audio_test_music_btn_hint = "Проигрывает зацикленный музыкальный трек на устройстве backglass, чтобы вы могли проверить, что он слышен и правильно подключён по левому/правому каналу."
audio_pan_hint = "Перетаскивайте, чтобы сместить тестовую музыку между левым и правым динамиками backglass, подтверждая, что они не перепутаны."
audio_speaker_test_hint = "Проигрывает тестовый звук только на этом динамике, чтобы вы могли подтвердить, что он подключён к соответствующему углу кабинета."
audio_ball_top_bottom_hint = "Прогоняет звук катящегося шара от фронтальных динамиков к lockbar. Если движение кажется обратным, смените режим выхода выше."
audio_ball_left_right_hint = "Прогоняет звук катящегося шара от левых динамиков к правым. Если направление неверное, проверьте подключение левого/правого каналов."
tables_dir_path_hint = "Корневая папка, содержащая по одной подпапке на стол (схема «папка на стол» VPX 10.8). PinReady сканирует её, чтобы составить ваш список столов."
tables_dir_browse_hint = "Открыть выбор папки, чтобы указать ваш каталог столов, не вводя путь вручную."
tables_dir_merge_vpinmame_hint = "Существующая папка VPinMAME (roms, nvram, cfg…). Её файлы импортируются в папку pinmame каждого соответствующего стола. Оставьте пустым, если у вас её нет."
tables_dir_merge_pupvideos_hint = "Существующая папка pupvideos от PinUP Player. Соответствующие видео импортируются в папку pupvideos каждого стола. Оставьте пустым, если не используется."
tables_dir_merge_music_hint = "Существующая папка с музыкой. Соответствующие треки импортируются в папку music каждого стола. Оставьте пустым, если не используется."
tables_dir_merge_strategy_copy_hint = "Дублирует исходные файлы в ваш каталог столов и сохраняет оригиналы. Самый безопасный выбор, но использует больше всего места на диске."
tables_dir_merge_strategy_move_hint = "Перемещает файлы в ваш каталог столов и удаляет их из источника. Экономит место на диске, но опустошает исходные папки."
tables_dir_merge_strategy_symlink_hint = "Создаёт ссылки, указывающие на оригиналы, вместо копирования. Практически не использует место на диске, но исходные папки должны оставаться на месте."
tables_dir_merge_dry_run_hint = "Сканирует источники и перечисляет, что было бы импортировано, не изменяя никаких файлов. Запустите это сначала, чтобы предпросмотреть результат."
tables_dir_merge_apply_hint = "Выполняет импорт по-настоящему, используя план из пробного прогона. Файлы копируются, перемещаются или связываются согласно выбранной вами стратегии."
tables_dir_merge_cancel_hint = "Останавливает выполняемый в данный момент импорт. Уже импортированные файлы сохраняются."
system_mirror_clear_hint = "Очищает URL самостоятельно размещённого зеркала и восстанавливает прямые загрузки с GitHub. Используйте это, если зеркало не в сети или вы его больше не используете."
