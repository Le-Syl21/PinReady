tables_catalog_title = "Arricchimento catalogo (VPSDB + VPinMediaDB)"
tables_catalog_desc = "Identifica ogni tavolo installato nel catalogo Virtual Pinball Spreadsheet (~2500 giochi) e scarica backglass (bg.png) + jingle audio (audio.mp3) da VPinMediaDB in <table>/medias/. La prima sincronizzazione trasferisce ~7 MB di JSON del catalogo più alcuni MB per tavolo identificato. Necessario per l'anteprima al passaggio del mouse e i badge di aggiornamento disponibile nella griglia. Attivo di default: disattivalo su pincab offline o con dati limitati."
tables_catalog_toggle = "Sincronizza VPSDB + VPinMediaDB durante la scansione"
tilt_nudge_type = "Tipo di sensore per il nudge:"
tilt_nudge_type_game = "Controller di gioco"
tilt_nudge_type_intent = "Sensore d'intenzione"
tilt_nudge_type_cabinet = "Sensore da cabinet"
tilt_nudge_type_help = "Tipo di sensore che gestisce il nudge.\n• Controller di gioco: usa la posizione dello stick — per i gamepad, non per gli accelerometri da cabinet.\n• Sensore d'intenzione (consigliato): legge l'accelerometro per stimare la tua intenzione di nudge, poi applica la fisica di VPX — ideale per le schede Pinscape/KL25Z.\n• Sensore da cabinet: applica l'accelerazione grezza direttamente al gioco — solo per un vero cabinet con un sensore ad alta frequenza, bassa latenza e senza rumore."
tilt_show_plumb = "Visualizza il nudge in gioco (overlay a filo a piombo)"
tilt_show_plumb_help = "Mostra il filo a piombo di VPX — un punto dentro un cerchio, vicino all'overlay degli FPS — che si muove quando fai un nudge, così puoi verificare che il nudge funzioni. (Impostazione VPX: SimulatedPlumb.)"
screens_language_hint = "Lingua dell'interfaccia di PinReady. Questo non cambia la lingua di Visual Pinball stesso."
screens_vpx_auto_hint = "Scarica e installa una build recente del fork di Visual Pinball X validato con PinReady (repository Le-Syl21/vpinball) — non il VPX ufficiale. Consigliato se non hai già VPX installato."
screens_vpx_install_button_hint = "Scarica la versione indicata sopra e installala nella cartella qui sotto."
screens_vpx_browse_dir_hint = "Scegli la cartella in cui verrà installato Visual Pinball X."
screens_vpx_manual_hint = "Usa un Visual Pinball X che hai già installato tu stesso invece di scaricarne uno."
screens_vpx_exe_hint = "Percorso del tuo eseguibile VPinballX_BGFX esistente."
screens_vpx_browse_exe_hint = "Individua l'eseguibile VPinballX_BGFX sul tuo disco."
screens_count_hint = "Quanti schermi usa la tua configurazione.\n• Desktop: di solito 1.\n• Pincab completo: 3 o 4 (playfield, backglass, DMD e un topper opzionale)."
screens_mode_desktop_hint = "Vista a schermo singolo per un normale monitor da scrivania. Il tavolo è mostrato da una classica angolazione frontale."
screens_mode_cabinet_hint = "Vista cabinet per un vero pincab: il playfield è renderizzato per uno schermo posato in piano, con backglass e DMD su schermi separati."
screens_mode_fss_hint = "Full Single Screen: playfield e backglass impilati su un unico schermo alto. Usalo quando hai un solo schermo in verticale."
screens_disable_touch_hint = "Disattiva l'overlay tattile a schermo di VPX. Attivalo su un pincab il cui playfield è uno schermo non tattile — e soprattutto se piloti la macchina da remoto (RustDesk, VNC, TeamViewer…): altrimenti il puntatore remoto può essere scambiato per un tocco e innescare azioni involontarie in VPX."
screens_physical_size_hint = "Larghezza e altezza fisiche di questo schermo in millimetri. VPX le usa per scalare il tavolo alle dimensioni reali. Compilate automaticamente dall'EDID del monitor quando disponibile."
screens_role_hint = "Cosa mostra questo schermo in VPX: Playfield, Backglass, DMD o Topper. Lascialo su Inutilizzato per ignorare lo schermo."
screens_cab_lockbar_width_hint = "Larghezza della lockbar del cabinet (la barra anteriore). Usata per scalare la pallina a schermo rispetto alla dimensione reale del tuo cabinet."
screens_cab_lockbar_height_hint = "Altezza della lockbar dal pavimento. Combinata con l'altezza dei tuoi occhi, definisce l'angolo di visione sul playfield."
screens_cab_inclination_hint = "Angolo di inclinazione dello schermo del playfield. Impostalo sulla pendenza reale del vetro del playfield del tuo cabinet."
screens_cab_player_height_hint = "La tua altezza da in piedi. Usata per calcolare la posizione dei tuoi occhi per una prospettiva corretta."
screens_cab_player_distance_hint = "Quanto stai lontano dalla lockbar (da davanti a dietro). Negativo significa dietro la lockbar, positivo significa sporgersi sopra di essa."
screens_cab_player_offset_hint = "Il tuo scostamento sinistra/destra rispetto al centro del cabinet. Lascia a 0 a meno che tu non stia spostato su un lato."
rendering_aa_hint = "Il supersampling renderizza il tavolo a una risoluzione interna più alta e poi la riduce, smussando i bordi frastagliati.\n• Sopra 1.0: rende l'immagine più nitida, al costo della GPU.\n• Sotto 1.0: aumenta il framerate sulle macchine più deboli."
rendering_msaa_hint = "L'anti-aliasing MSAA smussa i bordi della geometria come rampe e wireform. Valori più alti appaiono più puliti ma costano più GPU. Lascialo disattivato se il supersampling o l'FXAA gestisce già l'aliasing."
rendering_fxaa_hint = "L'anti-aliasing in post-elaborazione smussa l'intera immagine dopo il rendering, a costo GPU molto basso. Le modalità più forti ammorbidiscono più bordi ma possono sfocare leggermente il playfield. Una buona scelta su hardware modesto."
rendering_sharpen_hint = "La nitidezza contrasta l'ammorbidimento causato dall'anti-aliasing o dal supersampling, rendendo più nitidi gli insert e il testo. Attivala se l'immagine appare un po' sfocata. Lasciala disattivata se è già nitida."
rendering_reflections_hint = "Controlla cosa riflette il playfield: la pallina, le parti statiche o gli oggetti dinamici. Più riflessi rendono l'immagine più ricca ma costano GPU. Riducili se il framerate cala sui tavoli affollati."
rendering_tex_size_hint = "Limita la risoluzione massima delle texture caricate da VPX. Il valore predefinito (16384) mantiene tutti i dettagli. Abbassalo solo se una GPU con memoria video limitata esaurisce la memoria o scatta."
inputs_pinscape_profile_hint = "Scegli il profilo corrispondente alla tua scheda controller per flipper (KL25Z, Pico, DudesCab o PinOne). Riempie la colonna joystick con la disposizione dei pulsanti di fabbrica di quella scheda. Scegli Nessuno per cancellare quei valori predefiniti e mappare ogni pulsante da solo."
inputs_gamepad_hint = "Attiva questa opzione per usare il gamepad rilevato per navigare in PinReady e per le azioni in gioco. Disattivala se giochi solo con una tastiera o un controller per flipper dedicato."
inputs_auto_map_hint = "Scorri ogni azione una per una: premi il tasto o il pulsante del controller che vuoi per ciascuna. Il modo più veloce per configurare tutti i comandi in un solo passaggio."
inputs_auto_map_skip_hint = "Mantieni invariata l'assegnazione attuale di questa azione e passa alla successiva."
inputs_auto_map_cancel_hint = "Interrompi ora la mappatura guidata. Le assegnazioni già registrate in questo passaggio vengono mantenute."
inputs_map_hint = "Clicca, poi premi un tasto o un pulsante del controller per assegnarlo a questa azione. Un tasto riempie la colonna tastiera, un pulsante del controller riempie la colonna joystick; entrambi possono coesistere."
outputs_open_folder_hint = "Apre la cartella in cui DOF cerca la sua configurazione. Estrai qui lo zip del generatore, poi riavvia VPX affinché carichi la configurazione."
outputs_dof_disable_hint = "Disattiva nuovamente il plugin DOF in VPinballX.ini. I tuoi solenoidi, flasher e shaker smetteranno di reagire in gioco."
outputs_dof_activate_hint = "Scrive Enable = 1 per il plugin DOF affinché VPX piloti il tuo hardware di uscita. Utile solo una volta che la configurazione DOF è stata generata ed estratta."
outputs_discover_ack_hint = "Conferma che hai capito che il test aziona fisicamente solenoidi e motori. Spuntala per sbloccare i pulsanti di scansione e simulatore."
outputs_discover_scan_hint = "Cerca i controller di uscita collegati (Pinscape, ecc.) via USB così puoi impulsare le loro uscite una per una."
outputs_discover_simulator_hint = "Esegue il flusso di scoperta su una scheda fittizia da 22 uscite. Un modo sicuro per provare l'interfaccia senza hardware collegato."
outputs_discover_start_hardware_hint = "Apre la scheda rilevata e inizia a impulsare le sue uscite così puoi annotare quale pin piloti quale dispositivo sul cabinet."
outputs_discover_copy_udev_hint = "Copia le regole udev negli appunti così puoi incollarle in un file di regole per l'accesso HID senza root."
outputs_discover_pulse_stop_hint = "Ferma il ciclo di impulsi automatici sull'uscita corrente."
outputs_discover_pulse_start_hint = "Impulsa ripetutamente l'uscita selezionata così puoi individuare quale dispositivo attiva sul cabinet."
outputs_discover_replay_hint = "Riavvia il ciclo di impulsi sull'uscita corrente se ti sei perso quale dispositivo ha reagito."
outputs_discover_prev_hint = "Torna al numero di uscita precedente per testarlo ed etichettarlo."
outputs_discover_next_hint = "Passa al numero di uscita successivo per testarlo ed etichettarlo."
outputs_discover_label_hint = "Dai un nome al dispositivo cablato su questa uscita (es. Flipper sinistro, Shaker). Queste etichette costruiscono il riepilogo da incollare nel generatore DOF."
outputs_discover_copy_hint = "Copia l'elenco numerato delle tue uscite etichettate negli appunti, come riferimento mentre compili configtool.vpuniverse.com."
outputs_discover_end_session_hint = "Termina la sessione di scoperta e cancella le etichette di uscita attuali. Copia prima il riepilogo se ti serve ancora."
audio_device_bg_hint = "Scheda audio o altoparlanti usati per la musica, gli annunci e i suoni generali del gioco (lato backglass). Lascia su predefinito a meno che tu non instradi questi suoni verso un'uscita separata."
audio_device_pf_hint = "Scheda audio o altoparlanti usati per i suoni meccanici del playfield (flipper, bumper, rotolamento della pallina). Per il surround o l'SSF questa deve essere l'uscita multicanale."
audio_mode_front_stereo_hint = "Stereo semplice con entrambi gli altoparlanti davanti al cabinet. La configurazione più semplice, senza effetti spaziali."
audio_mode_rear_stereo_hint = "Stereo semplice con i due altoparlanti dietro il playfield, vicino alla lockbar. Usalo se i tuoi unici altoparlanti stanno vicino al giocatore."
audio_mode_surround_rear_hint = "Surround 5.1 con i canali posteriori posizionati alla lockbar. Richiede una scheda audio a 6 canali."
audio_mode_surround_front_hint = "Surround 5.1 con i canali anteriori posizionati alla lockbar. Scegli quello che corrisponde al modo in cui i tuoi altoparlanti sono cablati fisicamente."
audio_mode_ssf_legacy_hint = "Surround Sound Feedback con il vecchio mixaggio. L'SSF usa gli exciter del playfield così i suoni sembrano provenire dalla pallina; prova prima la variante Nuovo."
audio_mode_ssf_new_hint = "Surround Sound Feedback con il mixaggio più recente e consigliato. Migliore immersione su un cabinet SSF completo con exciter 7.1."
audio_music_volume_hint = "Livello complessivo della musica, degli annunci e dei suoni di gioco sull'uscita backglass (MusicVolume di VPX)."
audio_sound_volume_hint = "Livello dei suoni meccanici del playfield sull'uscita playfield (SoundVolume di VPX)."
audio_test_music_btn_hint = "Riproduce un brano musicale in loop sul dispositivo backglass così puoi verificare che sia udibile e cablato correttamente sinistra/destra."
audio_pan_hint = "Trascina per spostare la musica di test tra gli altoparlanti backglass sinistro e destro, confermando che non siano invertiti."
audio_speaker_test_hint = "Riproduce un suono di test solo su questo altoparlante, così puoi confermare che sia cablato all'angolo corrispondente del cabinet."
audio_ball_top_bottom_hint = "Fa scorrere un suono di pallina che rotola dagli altoparlanti anteriori alla lockbar. Se il movimento sembra invertito, cambia la modalità di uscita qui sopra."
audio_ball_left_right_hint = "Fa scorrere un suono di pallina che rotola dagli altoparlanti sinistri ai destri. Se la direzione è sbagliata, controlla il tuo cablaggio sinistra/destra."
tables_dir_path_hint = "Cartella radice che contiene una sottocartella per tavolo (organizzazione «una cartella per tavolo» di VPX 10.8). PinReady la analizza per costruire il tuo elenco di tavoli."
tables_dir_browse_hint = "Apre un selettore di cartelle per scegliere la tua directory dei tavoli invece di digitare il percorso a mano."
tables_dir_merge_vpinmame_hint = "Cartella VPinMAME esistente (roms, nvram, cfg…). I suoi file vengono importati nella cartella pinmame di ogni tavolo corrispondente. Lascia vuoto se non ne hai."
tables_dir_merge_pupvideos_hint = "Cartella pupvideos di PinUP Player esistente. I video corrispondenti vengono importati nella cartella pupvideos di ogni tavolo. Lascia vuoto se inutilizzata."
tables_dir_merge_music_hint = "Cartella di musica esistente. Le tracce corrispondenti vengono importate nella cartella music di ogni tavolo. Lascia vuoto se inutilizzata."
tables_dir_merge_strategy_copy_hint = "Duplica i file sorgente nella tua directory dei tavoli e conserva gli originali. La scelta più sicura, ma usa più spazio su disco."
tables_dir_merge_strategy_move_hint = "Sposta i file nella tua directory dei tavoli e li rimuove dalla sorgente. Risparmia spazio su disco ma svuota le cartelle originali."
tables_dir_merge_strategy_symlink_hint = "Crea collegamenti che puntano agli originali invece di copiare. Usa quasi nessuno spazio su disco, ma le cartelle sorgente devono restare al loro posto."
tables_dir_merge_dry_run_hint = "Analizza le sorgenti ed elenca cosa verrebbe importato, senza modificare alcun file. Eseguilo prima per visualizzare in anteprima il risultato."
tables_dir_merge_apply_hint = "Esegue l'importazione per davvero, usando il piano della simulazione. I file vengono copiati, spostati o collegati secondo la strategia scelta."
tables_dir_merge_cancel_hint = "Ferma l'importazione attualmente in corso. I file già importati vengono conservati."
system_mirror_clear_hint = "Cancella l'URL del mirror self-hosted e ripristina i download diretti da GitHub. Usa questo se il mirror è offline o se non ne gestisci più uno."
