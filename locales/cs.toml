tables_rebuild_title = "Tlačítko Znovu sestavit (ve spouštěči stolů)"
tables_rebuild_desc = "Kliknutím smažete všechny backglass v mezipaměti a stav VBS patchů, poté se adresář stolů od začátku znovu prohledá. Použijte tuto funkci, když PinReady vypadá nesynchronně s vaším diskem — po reorganizaci stolů nebo pro získání čerstvě vydaného patche od Le-Syl21."
tables_vbs_patch_title = "Kompatibilita s Visual Pinball Standalone"
