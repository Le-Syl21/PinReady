tables_vbs_patch_backup = "Pokud jste měli vlastní přizpůsobený soubor <table>.vbs, před aplikací patche se uloží jako <table>.pre_standalone.vbs (VPX tento název automaticky nenačte) — funkční stůl a vaše původní skript bezpečně zálohovaný. Ve výchozím stavu vypnuto: katalog občas obsahuje patche, které některé stoly rozbíjí, proto tuto volbu zapněte uvědoměle."

