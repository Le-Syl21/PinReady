screens_vpx_install_button_hint = "Stáhne verzi zobrazenou výše a nainstaluje ji do složky níže."
screens_vpx_browse_dir_hint = "Vyberte složku, kam bude Visual Pinball X nainstalován."
screens_vpx_manual_hint = "Použijte Visual Pinball X, který jste si sami nainstalovali, místo stahování nového."
screens_vpx_exe_hint = "Cesta k vašemu existujícímu spustitelnému souboru VPinballX_BGFX."
screens_vpx_browse_exe_hint = "Najděte na disku spustitelný soubor VPinballX_BGFX."
screens_count_hint = "Kolik displejů vaše sestava používá.\n• Stolní počítač: obvykle 1.\n• Plnohodnotný pincab: 3 nebo 4 (herní plocha, backglass, DMD a volitelný topper)."
screens_mode_desktop_hint = "Pohled na jedné obrazovce pro běžný stolní monitor. Stůl je zobrazen ze standardního čelního úhlu."
screens_mode_cabinet_hint = "Pohled kabinetu pro skutečný pincab: herní plocha je vykreslena pro naplocho položenou obrazovku, s backglass a DMD na samostatných displejích."
screens_mode_fss_hint = "Full Single Screen: herní plocha a backglass naskládané na jedné vysoké obrazovce. Použijte, když máte jediný displej na výšku."
screens_disable_touch_hint = "Vypne dotykový overlay zobrazovaný VPX. Zapněte tuto volbu, pokud obrazovka vašeho flipperu není dotyková — a zejména pokud stroj ovládáte na dálku (RustDesk, VNC, TeamViewer…): vzdálený kurzor může být jinak považován za dotyk a spouštět neúmyslné akce ve VPX."
screens_physical_size_hint = "Fyzická šířka a výška této obrazovky v milimetrech. VPX ji používá k přizpůsobení stolu skutečné velikosti. Automaticky vyplněno z EDID monitoru, pokud je k dispozici."
screens_role_hint = "Co tato obrazovka ve VPX zobrazuje: herní plocha, backglass, DMD nebo topper. Ponechte na Nepoužito, chcete-li displej ignorovat."
screens_cab_lockbar_width_hint = "Šířka lockbaru kabinetu (přední lišty). Používá se k přizpůsobení koule na obrazovce skutečné velikosti vašeho kabinetu."
screens_cab_lockbar_height_hint = "Výška lockbaru nad podlahou. V kombinaci s výškou vašich očí určuje úhel pohledu na herní plochu."
screens_cab_inclination_hint = "Úhel náklonu obrazovky herní plochy. Nastavte jej podle skutečného sklonu skla herní plochy vašeho kabinetu."
screens_cab_player_height_hint = "Vaše výška ve stoje. Používá se k výpočtu pozice vašich očí pro správnou perspektivu."
screens_cab_player_distance_hint = "Jak daleko stojíte od lockbaru (zepředu dozadu). Záporné znamená za lockbarem, kladné znamená nakloněný nad ním."
screens_cab_player_offset_hint = "Vaše posunutí vlevo/vpravo od středu kabinetu. Ponechte na 0, pokud nestojíte na jedné straně."
rendering_aa_hint = "Supersampling vykresluje stůl ve vyšším interním rozlišení a poté jej zmenší, čímž vyhladí zubaté hrany.\n• Nad 1.0: zostří obraz na úkor GPU.\n• Pod 1.0: zvýší snímkovou frekvenci na slabších strojích."
rendering_msaa_hint = "Antialiasing MSAA vyhlazuje hrany geometrie, jako jsou rampy a drátěné konstrukce. Vyšší hodnoty vypadají čistěji, ale více zatěžují GPU. Ponechte vypnuté, pokud aliasing již řeší supersampling nebo FXAA."
rendering_fxaa_hint = "Antialiasing v postprocesu vyhladí celý obraz po vykreslení, velmi levně na GPU. Silnější režimy změkčí více hran, ale mohou mírně rozmazat herní plochu. Dobrá volba na slabším hardwaru."
rendering_sharpen_hint = "Zaostření vyrovnává změkčení způsobené antialiasingem nebo supersamplingem, čímž zostří inserty a text. Zapněte, pokud obraz vypadá mírně rozmazaně. Ponechte vypnuté, pokud už vypadá ostře."
rendering_reflections_hint = "Řídí, co herní plocha odráží: kouli, statické části nebo dynamické objekty. Více odrazů vypadá bohatěji, ale stojí GPU. Snižte, pokud snímková frekvence klesá na náročných stolech."
rendering_tex_size_hint = "Omezuje maximální rozlišení textur, které VPX načítá. Výchozí hodnota (16384) zachová plný detail. Snižte ji pouze tehdy, pokud GPU s omezenou grafickou pamětí dojde paměť nebo trhá."
inputs_pinscape_profile_hint = "Vyberte profil odpovídající vaší desce pinballového ovladače (KL25Z, Pico, DudesCab nebo PinOne). Vyplní sloupec joysticku tovární rozvržením tlačítek této desky. Zvolte Žádný, chcete-li tyto výchozí hodnoty vymazat a namapovat každé tlačítko sami."
inputs_gamepad_hint = "Zapněte, chcete-li použít detekovaný gamepad pro navigaci v PinReady a pro akce ve hře. Vypněte, pokud hrajete pouze klávesnicí nebo vyhrazeným pinballovým ovladačem."
inputs_auto_map_hint = "Projděte každou akci jednu po druhé: pro každou stiskněte klávesu nebo tlačítko ovladače, které chcete. Nejrychlejší způsob, jak nastavit všechna ovládání jedním průchodem."
inputs_auto_map_skip_hint = "Ponechte aktuální přiřazení této akce beze změny a přejděte na další."
inputs_auto_map_cancel_hint = "Zastavte nyní řízené mapování. Přiřazení již zachycená v tomto průchodu se zachovají."
inputs_map_hint = "Klikněte, poté stiskněte klávesu nebo tlačítko ovladače pro přiřazení k této akci. Klávesa vyplní sloupec klávesnice, tlačítko ovladače vyplní sloupec joysticku; obojí může koexistovat."
outputs_open_folder_hint = "Otevře složku, kde DOF hledá svou konfiguraci. Rozbalte sem zip z generátoru a poté restartujte VPX, aby konfiguraci načetl."
outputs_dof_disable_hint = "Znovu vypne plugin DOF ve VPinballX.ini. Vaše solenoidy, flashery a shakery přestanou ve hře reagovat."
outputs_dof_activate_hint = "Zapíše Enable = 1 pro plugin DOF, aby VPX řídil váš výstupní hardware. Užitečné pouze poté, co byla vaše konfigurace DOF vygenerována a rozbalena."
outputs_discover_ack_hint = "Potvrzuje, že rozumíte tomu, že test fyzicky aktivuje solenoidy a motory. Zaškrtněte pro odemknutí tlačítek skenování a simulátoru."
outputs_discover_scan_hint = "Vyhledá připojené výstupní řadiče (Pinscape atd.) přes USB, abyste mohli pulzovat jejich výstupy jeden po druhém."
outputs_discover_simulator_hint = "Spustí proces zjišťování proti fiktivní desce s 22 výstupy. Bezpečný způsob, jak vyzkoušet rozhraní bez připojeného hardwaru."
outputs_discover_start_hardware_hint = "Otevře detekovanou desku a začne pulzovat její výstupy, abyste si mohli poznamenat, který pin řídí které zařízení na kabinetu."
outputs_discover_copy_udev_hint = "Zkopíruje pravidla udev do schránky, abyste je mohli vložit do souboru pravidel pro přístup k HID bez rootu."
outputs_discover_pulse_stop_hint = "Zastaví smyčku automatického pulzování na aktuálním výstupu."
outputs_discover_pulse_start_hint = "Opakovaně pulzuje vybraný výstup, abyste odhalili, které zařízení na kabinetu spouští."
outputs_discover_replay_hint = "Znovu spustí smyčku pulzování na aktuálním výstupu, pokud jste přehlédli, které zařízení reagovalo."
outputs_discover_prev_hint = "Přejde zpět na předchozí číslo výstupu, aby jej otestoval a označil."
outputs_discover_next_hint = "Přejde na další číslo výstupu, aby jej otestoval a označil."
outputs_discover_label_hint = "Pojmenujte zařízení připojené k tomuto výstupu (např. Levý flipper, Shaker). Tyto štítky tvoří souhrn, který vložíte do generátoru DOF."
outputs_discover_copy_hint = "Zkopíruje očíslovaný seznam vašich označených výstupů do schránky jako referenci při vyplňování configtool.vpuniverse.com."
outputs_discover_end_session_hint = "Ukončí relaci zjišťování a vymaže aktuální štítky výstupů. Nejprve zkopírujte souhrn, pokud jej ještě potřebujete."
audio_device_bg_hint = "Zvuková karta nebo reproduktory používané pro hudbu, hlášení a obecné zvuky hry (strana backglass). Ponechte na výchozím, pokud tyto zvuky nesměrujete na samostatný výstup."
audio_device_pf_hint = "Zvuková karta nebo reproduktory používané pro mechanické zvuky herní plochy (flippery, bumpery, kutálení koule). Pro surround nebo SSF to musí být vícekanálový výstup."
audio_mode_front_stereo_hint = "Prosté stereo s oběma reproduktory vpředu kabinetu. Nejjednodušší nastavení, bez prostorových efektů."
audio_mode_rear_stereo_hint = "Prosté stereo se dvěma reproduktory za herní plochou, poblíž lockbaru. Použijte, pokud jsou vaše jediné reproduktory blízko hráče."
audio_mode_surround_rear_hint = "Surround 5.1 se zadními kanály umístěnými u lockbaru. Vyžaduje 6kanálovou zvukovou kartu."
audio_mode_surround_front_hint = "Surround 5.1 s předními kanály umístěnými u lockbaru. Zvolte ten, který odpovídá fyzickému zapojení vašich reproduktorů."
audio_mode_ssf_legacy_hint = "Surround Sound Feedback se starším mixem. SSF používá excitery na herní ploše, aby se zdálo, že zvuky přicházejí od koule; zkuste nejprve variantu Nový."
audio_mode_ssf_new_hint = "Surround Sound Feedback s novějším, doporučeným mixem. Nejlepší ponoření na plnohodnotném SSF kabinetu s excitery 7.1."
audio_music_volume_hint = "Celková úroveň hudby, hlášení a zvuků hry na výstupu backglass (MusicVolume ve VPX)."
audio_sound_volume_hint = "Úroveň mechanických zvuků herní plochy na výstupu herní plochy (SoundVolume ve VPX)."
audio_test_music_btn_hint = "Přehraje smyčku hudby na zařízení backglass, abyste ověřili, že je slyšitelná a správně zapojena vlevo/vpravo."
audio_pan_hint = "Táhnutím přesuňte testovací hudbu mezi levý a pravý reproduktor backglass a ověřte, že nejsou prohozené."
audio_speaker_test_hint = "Přehraje testovací zvuk pouze na tomto reproduktoru, abyste potvrdili, že je zapojen do odpovídajícího rohu kabinetu."
audio_ball_top_bottom_hint = "Přejíždí zvukem kutálející se koule od předních reproduktorů k lockbaru. Pokud se pohyb zdá obrácený, změňte režim výstupu výše."
audio_ball_left_right_hint = "Přejíždí zvukem kutálející se koule od levých reproduktorů k pravým. Pokud je směr špatný, zkontrolujte zapojení vlevo/vpravo."
tables_dir_path_hint = "Kořenová složka obsahující jednu podsložku na stůl (rozvržení „jedna složka na stůl“ z VPX 10.8). PinReady ji prohledá, aby sestavil váš seznam stolů."
tables_dir_browse_hint = "Otevře výběr složky pro volbu adresáře se stoly místo ručního zadávání cesty."
tables_dir_merge_vpinmame_hint = "Existující složka VPinMAME (roms, nvram, cfg…). Její soubory se importují do složky pinmame každého odpovídajícího stolu. Ponechte prázdné, pokud žádnou nemáte."
tables_dir_merge_pupvideos_hint = "Existující složka pupvideos z PinUP Player. Odpovídající videa se importují do složky pupvideos každého stolu. Ponechte prázdné, pokud se nepoužívá."
tables_dir_merge_music_hint = "Existující složka s hudbou. Odpovídající skladby se importují do složky music každého stolu. Ponechte prázdné, pokud se nepoužívá."
tables_dir_merge_strategy_copy_hint = "Zkopíruje zdrojové soubory do vašeho adresáře se stoly a zachová originály. Nejbezpečnější volba, ale využívá nejvíce místa na disku."
tables_dir_merge_strategy_move_hint = "Přesune soubory do vašeho adresáře se stoly a odstraní je ze zdroje. Šetří místo na disku, ale vyprázdní původní složky."
tables_dir_merge_strategy_symlink_hint = "Vytvoří odkazy směřující na originály namísto kopírování. Nevyužívá téměř žádné místo na disku, ale zdrojové složky musí zůstat na svém místě."
tables_dir_merge_dry_run_hint = "Prohledá zdroje a vypíše, co by se importovalo, bez změny jakýchkoli souborů. Spusťte nejprve pro náhled výsledku."
tables_dir_merge_apply_hint = "Provede import doopravdy podle plánu z náhledu. Soubory se zkopírují, přesunou nebo propojí podle vámi zvolené strategie."
tables_dir_merge_cancel_hint = "Zastaví právě probíhající import. Soubory, které již byly importovány, se zachovají."
system_mirror_clear_hint = "Vymaže URL vlastního zrcadla a obnoví přímé stahování z GitHubu. Použijte, pokud je zrcadlo offline nebo jej již neprovozujete."
