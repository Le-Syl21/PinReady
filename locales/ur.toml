rendering_msaa_hint = "Multisample anti-aliasing جیومیٹری کے کناروں جیسے ریمپس اور وائر فارمز کو ہموار کرتا ہے۔ زیادہ اقدار صاف نظر آتی ہیں مگر GPU پر زیادہ بوجھ ڈالتی ہیں؛ اگر supersampling یا FXAA پہلے ہی aliasing سنبھال رہا ہے تو اسے بند رہنے دیں۔"
rendering_fxaa_hint = "Post-process anti-aliasing رینڈرنگ کے بعد پوری تصویر کو ہموار کرتا ہے، GPU پر بہت کم بوجھ کے ساتھ۔ مضبوط موڈ زیادہ کناروں کو نرم کرتے ہیں مگر پلے فیلڈ کو قدرے دھندلا کر سکتے ہیں؛ کم طاقت والے ہارڈویئر پر ایک اچھا انتخاب۔"
rendering_sharpen_hint = "Sharpening anti-aliasing یا supersampling سے پیدا ہونے والی نرمی کی تلافی کرتی ہے، جس سے inserts اور متن زیادہ صاف ہوتے ہیں۔ اگر تصویر قدرے دھندلی لگے تو اسے آن کریں؛ اگر پہلے ہی صاف لگے تو بند رہنے دیں۔"
rendering_reflections_hint = "طے کرتا ہے کہ پلے فیلڈ کیا منعکس کرتا ہے: گیند، ساکن حصے، یا متحرک اشیاء۔ زیادہ عکس تصویر کو زیادہ بھرپور بناتے ہیں مگر GPU کی قیمت پر؛ اگر مصروف ٹیبلوں پر فریم ریٹ گر جائے تو اسے کم کریں۔"
