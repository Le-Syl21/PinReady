screens_disable_touch_hint = "VPX'in ekran üzerindeki dokunma kaplamasını kapatır. Oyun alanı dokunmatik olmayan bir ekran olan bir pincab'de bunu etkinleştirin — özellikle de makineyi uzaktan yönetiyorsanız (RustDesk, VNC, TeamViewer…): aksi halde uzak imleç, dokunmatik girdi olarak algılanıp VPX'te istenmeyen işlemler tetikleyebilir."
screens_physical_size_hint = "Bu ekranın milimetre cinsinden fiziksel genişliği ve yüksekliği. VPX bunu masayı gerçek boyuta ölçeklemek için kullanır. Mevcut olduğunda monitörün EDID'sinden otomatik doldurulur."
screens_role_hint = "Bu ekranın VPX'te ne gösterdiği: Oyun alanı, Backglass, DMD veya Topper. Ekranı yok saymak için Kullanılmıyor olarak bırakın."
screens_cab_lockbar_width_hint = "Kabin lockbar'ının (ön ray) genişliği. Ekrandaki topu kabininizin gerçek boyutuna göre ölçeklemek için kullanılır."
screens_cab_lockbar_height_hint = "Lockbar'ın zeminden yüksekliği. Göz yüksekliğinizle birleştirilerek oyun alanına bakış açısını belirler."
