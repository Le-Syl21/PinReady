tilt_nudge_type_help = "Nudge'ı hangi sensör türünün yönlendirdiğini belirler.\n• Oyun Kumandası: çubuk konumunu kullanır — gamepad'ler için, kabin ivmeölçerleri için değil.\n• Niyet Sensörü (önerilir): nudge niyetinizi tahmin etmek için ivmeölçeri okur, ardından VPX fiziğini uygular — Pinscape/KL25Z kartları için en iyisidir.\n• Kabin Sensörü: ham ivmeyi doğrudan emüle edilen nudge'a eşler — yalnızca yüksek frekanslı, düşük gecikmeli, gürültüsüz sensöre sahip gerçek bir kabin için."
tilt_show_plumb = "Nudge'ı oyun içinde göster (çekül kaplaması)"
