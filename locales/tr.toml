rendering_aa_hint = "Süper örnekleme, masayı daha yüksek bir dahili çözünürlükte işleyip küçülterek tırtıklı kenarları yumuşatır.\n• 1.0 üzeri: GPU maliyetiyle görüntüyü keskinleştirir.\n• 1.0 altı: zayıf makinelerde kare hızını artırır."
rendering_msaa_hint = "Çoklu örnekleme kenar yumuşatma, rampalar ve tel formlar gibi geometri kenarlarını yumuşatır. Daha yüksek değerler daha temiz görünür ancak daha çok GPU harcar. Süper örnekleme veya FXAA tırtıklanmayı zaten hallediyorsa kapalı bırakın."
rendering_fxaa_hint = "Son işlem kenar yumuşatma, işlemeden sonra tüm görüntüyü yumuşatır ve GPU'da çok ucuzdur. Daha güçlü modlar daha fazla kenarı yumuşatır ancak oyun alanını biraz bulanıklaştırabilir. Düşük donanımda iyi bir seçim."
rendering_sharpen_hint = "Keskinleştirme, kenar yumuşatma veya süper örneklemenin neden olduğu yumuşamayı dengeleyerek insert'leri ve metni daha net hale getirir. Görüntü biraz bulanık görünüyorsa etkinleştirin. Zaten net görünüyorsa kapalı bırakın."
rendering_reflections_hint = "Oyun alanının neyi yansıttığını denetler: top, statik parçalar veya dinamik nesneler. Daha fazla yansıma daha zengin görünür ancak GPU harcar. Yoğun masalarda kare hızı düşüyorsa bunu azaltın."
rendering_tex_size_hint = "VPX'in yüklediği maksimum doku çözünürlüğünü sınırlar. Varsayılan (16384) tüm ayrıntıyı korur. Yalnızca sınırlı video belleğine sahip bir GPU belleği tükeniyor veya takılıyorsa düşürün."
inputs_pinscape_profile_hint = "Pinball kumanda kartınıza uyan profili seçin (KL25Z, Pico, DudesCab veya PinOne). Joystick sütununu o kartın fabrika buton düzeniyle doldurur. Bu varsayılanları temizleyip her butonu kendiniz eşlemek için Hiçbiri'ni seçin."
inputs_gamepad_hint = "Algılanan gamepad'i PinReady'de gezinmek ve oyun içi eylemler için kullanmak üzere bunu etkinleştirin. Yalnızca klavye veya özel bir pinball kumandasıyla oynuyorsanız kapatın."
inputs_auto_map_hint = "Her eylemi tek tek gözden geçirin: her biri için istediğiniz tuşa veya kumanda butonuna basın. Tüm kontrollerinizi tek seferde ayarlamanın en hızlı yolu."
inputs_auto_map_skip_hint = "Bu eylemin mevcut atamasını değiştirmeden bir sonrakine geçin."
inputs_auto_map_cancel_hint = "Kılavuzlu eşlemeyi şimdi durdurun. Bu geçişte zaten yakalanan atamalar korunur."
inputs_map_hint = "Tıklayın, ardından bu eyleme bağlamak için bir tuşa veya kumanda butonuna basın. Bir tuş klavye sütununu, bir kumanda butonu joystick sütununu doldurur; ikisi bir arada bulunabilir."
outputs_open_folder_hint = "DOF'un yapılandırmasını aradığı klasörü açar. Üreticiden gelen zip'i buraya çıkarın, ardından yapılandırmayı algılaması için VPX'i yeniden başlatın."
outputs_dof_disable_hint = "VPinballX.ini'deki DOF eklentisini tekrar kapatır. Solenoidleriniz, flasher'larınız ve shaker'larınız oyun içinde tepki vermeyi bırakır."
outputs_dof_activate_hint = "DOF eklentisi için Enable = 1 yazar, böylece VPX çıkış donanımınızı sürer. Yalnızca DOF yapılandırmanız oluşturulup çıkarıldıktan sonra işe yarar."
outputs_discover_ack_hint = "Testin solenoidleri ve motorları fiziksel olarak ateşlediğini anladığınızı onaylar. Tarama ve simülatör butonlarını açmak için işaretleyin."
outputs_discover_scan_hint = "Bağlı çıkış kontrolörlerini (Pinscape vb.) USB üzerinden arar, böylece çıkışlarını tek tek darbeleyebilirsiniz."
outputs_discover_simulator_hint = "Keşif akışını sahte 22 çıkışlı bir karta karşı çalıştırır. Bağlı donanım olmadan arayüzü denemenin güvenli bir yolu."
outputs_discover_start_hardware_hint = "Algılanan kartı açar ve çıkışlarını darbelemeye başlar, böylece kabinde hangi pinin hangi cihazı sürdüğünü not edebilirsiniz."
outputs_discover_copy_udev_hint = "udev kurallarını panoya kopyalar, böylece root olmadan HID erişimi için bunları bir kurallar dosyasına yapıştırabilirsiniz."
outputs_discover_pulse_stop_hint = "Geçerli çıkıştaki otomatik darbeleme döngüsünü durdurur."
outputs_discover_pulse_start_hint = "Seçili çıkışı tekrar tekrar darbeler, böylece kabinde hangi cihazı tetiklediğini fark edebilirsiniz."
outputs_discover_replay_hint = "Hangi cihazın tepki verdiğini kaçırdıysanız geçerli çıkıştaki darbeleme döngüsünü yeniden başlatır."
outputs_discover_prev_hint = "Test edip etiketlemek için önceki çıkış numarasına geri döner."
outputs_discover_next_hint = "Test edip etiketlemek için sonraki çıkış numarasına geçer."
outputs_discover_label_hint = "Bu çıkışa bağlı cihazı adlandırın (ör. Sol Flipper, Shaker). Bu etiketler, DOF üreticisine yapıştırdığınız özeti oluşturur."
outputs_discover_copy_hint = "Etiketlenmiş çıkışlarınızın numaralı listesini, configtool.vpuniverse.com'u doldururken referans olması için panoya kopyalar."
outputs_discover_end_session_hint = "Keşif oturumunu sonlandırır ve geçerli çıkış etiketlerini temizler. Hâlâ ihtiyacınız varsa önce özeti kopyalayın."
audio_device_bg_hint = "Müzik, anonslar ve genel oyun sesleri (backglass tarafı) için kullanılan ses kartı veya hoparlörler. Bunları ayrı bir çıkışa yönlendirmiyorsanız varsayılanda bırakın."
audio_device_pf_hint = "Mekanik oyun alanı sesleri (flipper'lar, bumper'lar, top yuvarlanmaları) için kullanılan ses kartı veya hoparlörler. Surround veya SSF için bu, çok kanallı çıkış olmalıdır."
audio_mode_front_stereo_hint = "Her iki hoparlör de kabinin önünde olacak şekilde düz stereo. Uzamsal efekt içermeyen en basit kurulum."
audio_mode_rear_stereo_hint = "İki hoparlör oyun alanının arkasında, lockbar'a yakın olacak şekilde düz stereo. Yalnızca oyuncuya yakın hoparlörleriniz varsa bunu kullanın."
audio_mode_surround_rear_hint = "Arka kanalları lockbar'a yerleştirilmiş 5.1 surround. 6 kanallı bir ses kartı gerektirir."
audio_mode_surround_front_hint = "Ön kanalları lockbar'a yerleştirilmiş 5.1 surround. Hoparlörlerinizin fiziksel kablo düzenine uyanı seçin."
audio_mode_ssf_legacy_hint = "Eski mikslemeli Surround Sound Feedback. SSF, seslerin toptan geliyormuş gibi hissettirmesi için oyun alanı exciter'larını kullanır; önce Yeni varyantı deneyin."
audio_mode_ssf_new_hint = "Daha yeni, önerilen mikslemeli Surround Sound Feedback. 7.1 exciter'lı tam bir SSF kabininde en iyi sürükleyicilik."
audio_music_volume_hint = "Backglass çıkışındaki müzik, anons ve oyun seslerinin genel seviyesi (VPX MusicVolume)."
audio_sound_volume_hint = "Oyun alanı çıkışındaki mekanik oyun alanı seslerinin seviyesi (VPX SoundVolume)."
audio_test_music_btn_hint = "Backglass cihazında döngüsel bir müzik parçası çalar, böylece duyulabilir olduğunu ve sol/sağ doğru bağlandığını kontrol edebilirsiniz."
audio_pan_hint = "Test müziğini sol ve sağ backglass hoparlörleri arasında kaydırmak için sürükleyin, ters bağlanmadıklarını doğrulayın."
audio_speaker_test_hint = "Yalnızca bu hoparlörde bir test sesi çalar, böylece kabinin ilgili köşesine bağlı olduğunu doğrulayabilirsiniz."
audio_ball_top_bottom_hint = "Yuvarlanan top sesini ön hoparlörlerden lockbar'a doğru süpürür. Hareket ters gibi hissettiriyorsa yukarıdaki çıkış modunu değiştirin."
audio_ball_left_right_hint = "Yuvarlanan top sesini sol hoparlörlerden sağa doğru süpürür. Yön yanlışsa sol/sağ kablo düzeninizi kontrol edin."
tables_dir_path_hint = "Her masa için bir alt klasör içeren kök klasör (VPX 10.8 masa başına klasör düzeni). PinReady, masa listenizi oluşturmak için burayı tarar."
tables_dir_browse_hint = "Yolu elle yazmak yerine masa dizininizi seçmek için bir klasör seçici açar."
tables_dir_merge_vpinmame_hint = "Mevcut VPinMAME klasörü (roms, nvram, cfg…). Dosyaları eşleşen her masanın pinmame klasörüne aktarılır. Yoksa boş bırakın."
tables_dir_merge_pupvideos_hint = "Mevcut PinUP Player pupvideos klasörü. Eşleşen videolar her masanın pupvideos klasörüne aktarılır. Kullanılmıyorsa boş bırakın."
tables_dir_merge_music_hint = "Mevcut müzik klasörü. Eşleşen parçalar her masanın music klasörüne aktarılır. Kullanılmıyorsa boş bırakın."
tables_dir_merge_strategy_copy_hint = "Kaynak dosyaları masa dizininize kopyalar ve orijinalleri korur. En güvenli seçim ama en çok disk alanını kullanır."
tables_dir_merge_strategy_move_hint = "Dosyaları masa dizininize taşır ve kaynaktan kaldırır. Disk alanından tasarruf sağlar ama orijinal klasörleri boşaltır."
tables_dir_merge_strategy_symlink_hint = "Kopyalamak yerine orijinallere işaret eden bağlantılar oluşturur. Neredeyse hiç disk alanı kullanmaz ama kaynak klasörlerin yerinde kalması gerekir."
tables_dir_merge_dry_run_hint = "Kaynakları tarar ve hiçbir dosyayı değiştirmeden nelerin aktarılacağını listeler. Sonucu önizlemek için önce bunu çalıştırın."
tables_dir_merge_apply_hint = "Deneme çalıştırmasından gelen planı kullanarak aktarımı gerçekten gerçekleştirir. Dosyalar seçtiğiniz stratejiye göre kopyalanır, taşınır veya bağlanır."
tables_dir_merge_cancel_hint = "Devam eden aktarımı durdurur. Zaten aktarılan dosyalar korunur."
system_mirror_clear_hint = "Kendi barındırdığınız ayna URL'sini temizler ve doğrudan GitHub indirmelerini geri yükler. Ayna çevrimdışıysa veya artık bir ayna çalıştırmıyorsanız bunu kullanın."
