screens_language_hint = "PinReady için arayüz dili. Bu, Visual Pinball'un kendi dilini değiştirmez."
screens_vpx_auto_hint = "PinReady ile test edilmiş Visual Pinball X çatalının (Le-Syl21/vpinball deposu) yeni bir derlemesini indirip kurar — resmi VPX'i değil. Henüz VPX kurulu değilse önerilir."
screens_vpx_install_button_hint = "Yukarıda gösterilen sürümü indirir ve aşağıdaki klasöre kurar."
screens_vpx_browse_dir_hint = "Visual Pinball X'in kurulacağı klasörü seçin."
