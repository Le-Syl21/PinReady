screens_count_hint = "Kurulumunuzun kaç ekran kullandığı.\n• Masaüstü bilgisayar: genellikle 1.\n• Tam pincab: 3 veya 4 (oyun alanı, backglass, DMD ve isteğe bağlı topper)."
screens_mode_desktop_hint = "Normal bir masaüstü monitörü için tek ekran görünümü. Masa standart bir önden açıyla gösterilir."
