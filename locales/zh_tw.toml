screens_cab_lockbar_width_hint = "機台 lockbar（前方橫桿）的寬度。用於將螢幕上的鋼珠縮放至你機台的真實尺寸。"
screens_cab_lockbar_height_hint = "lockbar 離地面的高度。結合你的眼睛高度，用來設定檯面的觀看角度。"
screens_cab_inclination_hint = "檯面螢幕的傾斜角度。請調整為與你機台檯面玻璃的真實坡度一致。"
screens_cab_player_height_hint = "你站立時的身高。用於計算你的眼睛位置以取得正確的透視。"
screens_cab_player_distance_hint = "你與 lockbar 的距離（前後方向）。負值代表在 lockbar 後方，正值代表往前傾在其上方。"
screens_cab_player_offset_hint = "你相對於機台中心的左右偏移量。除非你站在某一側，否則保持為 0。"
rendering_aa_hint = "超取樣以更高的內部解析度算繪桌台再縮小，使鋸齒邊緣變平滑。\n• 高於 1.0：讓畫面更銳利，但耗用 GPU。\n• 低於 1.0：在較弱的機器上提升幀率。"
rendering_msaa_hint = "多重取樣抗鋸齒能平滑幾何邊緣，例如坡道與線框。數值越高越乾淨但耗用更多 GPU。若超取樣或 FXAA 已處理鋸齒，可關閉此項。"
rendering_fxaa_hint = "後製抗鋸齒會在算繪後平滑整個畫面，GPU 成本極低。較強的模式會平滑更多邊緣，但可能讓檯面略微模糊。適合低階硬體。"
rendering_sharpen_hint = "銳化可抵消抗鋸齒或超取樣造成的柔化，使 inserts 與文字更清晰。若畫面看起來略微模糊請啟用。若已經夠銳利則保持關閉。"
rendering_reflections_hint = "控制檯面反射的內容：鋼珠、靜態零件或動態物件。反射越多畫面越豐富但耗用 GPU。若在繁忙桌台上幀率下降，請降低此項。"
rendering_tex_size_hint = "限制 VPX 載入的最大貼圖解析度。預設值（16384）保留完整細節。只有在顯示記憶體有限的 GPU 記憶體不足或卡頓時才調低。"
inputs_pinscape_profile_hint = "挑選符合你彈珠台控制板（KL25Z、Pico、DudesCab 或 PinOne）的設定檔。它會以該板的原廠按鈕配置填入 joystick 欄位。選擇「無」可清除這些預設值並自行對應每個按鈕。"
inputs_gamepad_hint = "啟用此項可使用偵測到的手把來瀏覽 PinReady 及進行遊戲中的操作。若你只用鍵盤或專用的彈珠台控制器遊玩，請關閉此項。"
inputs_auto_map_hint = "逐一走過每個動作：為每個動作按下你想要的按鍵或控制器按鈕。這是一次設定完所有操作最快的方式。"
inputs_auto_map_skip_hint = "保留此動作目前的繫結不變，並繼續到下一個。"
inputs_auto_map_cancel_hint = "立即停止引導式對應。本次已擷取的繫結會保留。"
inputs_map_hint = "點擊後按下某個按鍵或控制器按鈕，即可將其繫結至此動作。按鍵會填入鍵盤欄位，控制器按鈕會填入 joystick 欄位；兩者可並存。"
outputs_open_folder_hint = "開啟 DOF 尋找其設定的資料夾。將產生器產出的 zip 解壓縮到此處，然後重新啟動 VPX 讓它讀取該設定。"
outputs_dof_disable_hint = "在 VPinballX.ini 中重新關閉 DOF 外掛。你的螺線管、flashers 與 shakers 將不再在遊戲中反應。"
outputs_dof_activate_hint = "為 DOF 外掛寫入 Enable = 1，讓 VPX 驅動你的輸出硬體。僅在你的 DOF 設定已產生並解壓縮後才有用。"
outputs_discover_ack_hint = "確認你了解此測試會實際觸發螺線管與馬達。勾選後可解鎖掃描與模擬器按鈕。"
outputs_discover_scan_hint = "透過 USB 尋找已連接的輸出控制器（Pinscape 等），讓你可以逐一脈衝其輸出。"
outputs_discover_simulator_hint = "以一塊虛擬的 22 輸出板執行探索流程。這是在沒有連接硬體的情況下試用介面的安全方式。"
outputs_discover_start_hardware_hint = "開啟偵測到的板子並開始脈衝其輸出，讓你記下哪個接腳驅動機台上的哪個裝置。"
outputs_discover_copy_udev_hint = "將 udev 規則複製到剪貼簿，讓你可貼入規則檔以取得非 root 的 HID 存取權。"
outputs_discover_pulse_stop_hint = "停止目前輸出上的自動脈衝迴圈。"
outputs_discover_pulse_start_hint = "反覆脈衝所選的輸出，讓你能辨識它在機台上觸發的是哪個裝置。"
outputs_discover_replay_hint = "若你錯過了哪個裝置反應，重新啟動目前輸出上的脈衝迴圈。"
outputs_discover_prev_hint = "退回上一個輸出編號以進行測試與標示。"
outputs_discover_next_hint = "前往下一個輸出編號以進行測試與標示。"
outputs_discover_label_hint = "為接在此輸出上的裝置命名（例如左 Flipper、Shaker）。這些標籤會構成你貼入 DOF 產生器的摘要。"
outputs_discover_copy_hint = "將你已標示輸出的編號清單複製到剪貼簿，作為填寫 configtool.vpuniverse.com 時的參考。"
outputs_discover_end_session_hint = "結束探索工作階段並清除目前的輸出標籤。若你仍需要，請先複製摘要。"
audio_device_bg_hint = "用於音樂、語音提示與一般遊戲音效（backglass 側）的音效卡或喇叭。除非你將這些聲音導向獨立的輸出，否則保持預設。"
audio_device_pf_hint = "用於檯面機械音效（flippers、bumpers、滾珠聲）的音效卡或喇叭。若使用環繞音效或 SSF，此處必須是多聲道輸出。"
audio_mode_front_stereo_hint = "單純立體聲，兩個喇叭都在機台前方。最簡單的配置，沒有空間效果。"
audio_mode_rear_stereo_hint = "單純立體聲，兩個喇叭在檯面後方、lockbar 附近。若你僅有的喇叭靠近玩家時使用。"
audio_mode_surround_rear_hint = "5.1 環繞音效，後置聲道放在 lockbar 處。需要 6 聲道音效卡。"
audio_mode_surround_front_hint = "5.1 環繞音效，前置聲道放在 lockbar 處。請選擇與你喇叭實際接線方式相符的選項。"
audio_mode_ssf_legacy_hint = "採用舊版混音的 Surround Sound Feedback。SSF 使用檯面 exciters 讓聲音彷彿來自鋼珠；建議先試「新版」。"
audio_mode_ssf_new_hint = "採用較新且建議的混音的 Surround Sound Feedback。在配備 7.1 exciters 的完整 SSF 機台上有最佳沉浸感。"
audio_music_volume_hint = "backglass 輸出上音樂、語音提示與遊戲音效的整體音量（VPX MusicVolume）。"
audio_sound_volume_hint = "檯面輸出上機械檯面音效的音量（VPX SoundVolume）。"
audio_test_music_btn_hint = "在 backglass 裝置上循環播放一段音樂，讓你確認它是否可聽見且左右接線正確。"
audio_pan_hint = "拖曳以在左右 backglass 喇叭之間移動測試音樂，確認它們沒有接反。"
audio_speaker_test_hint = "僅在此喇叭上播放測試音效，讓你確認它是否接到機台對應的角落。"
audio_ball_top_bottom_hint = "讓滾珠音效從前方喇叭掃移到 lockbar。若感覺移動方向相反，請切換上方的輸出模式。"
audio_ball_left_right_hint = "讓滾珠音效從左側喇叭掃移到右側。若方向不正確，請檢查你的左右接線。"
tables_dir_path_hint = "存放每個桌台一個子資料夾的根資料夾（VPX 10.8 的「每桌一資料夾」配置）。PinReady 會掃描它以建立你的桌台清單。"
tables_dir_browse_hint = "開啟資料夾選擇器來選取你的桌台目錄，不必手動輸入路徑。"
tables_dir_merge_vpinmame_hint = "現有的 VPinMAME 資料夾（roms、nvram、cfg…）。其檔案會匯入每個相符桌台的 pinmame 資料夾。若沒有請留空。"
tables_dir_merge_pupvideos_hint = "現有的 PinUP Player pupvideos 資料夾。相符的影片會匯入每個桌台的 pupvideos 資料夾。若未使用請留空。"
tables_dir_merge_music_hint = "現有的音樂資料夾。相符的曲目會匯入每個桌台的 music 資料夾。若未使用請留空。"
tables_dir_merge_strategy_copy_hint = "將來源檔案複製到你的桌台目錄並保留原始檔案。最安全的選擇，但使用最多磁碟空間。"
tables_dir_merge_strategy_move_hint = "將檔案移動到你的桌台目錄並從來源移除。節省磁碟空間但會清空原始資料夾。"
tables_dir_merge_strategy_symlink_hint = "建立指向原始檔案的連結而非複製。幾乎不使用磁碟空間，但來源資料夾必須保持在原位。"
tables_dir_merge_dry_run_hint = "掃描來源並列出會匯入的內容，不變更任何檔案。先執行此項以預覽結果。"
tables_dir_merge_apply_hint = "根據模擬執行的計畫實際進行匯入。檔案會依你選擇的策略複製、移動或連結。"
tables_dir_merge_cancel_hint = "停止目前進行中的匯入。已匯入的檔案會保留。"
system_mirror_clear_hint = "清除自架的鏡像 URL 並恢復直接從 GitHub 下載。若鏡像離線或你不再運行鏡像，請使用此項。"
