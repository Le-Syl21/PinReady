tables_dir_path_hint = "包含每个桌台一个子文件夹的根文件夹（VPX 10.8 的每桌台一文件夹布局）。PinReady 扫描它以构建你的桌台列表。"
tables_dir_browse_hint = "打开文件夹选择器以选择你的桌台目录，而无需手动输入路径。"
tables_dir_merge_vpinmame_hint = "现有的 VPinMAME 文件夹（roms、nvram、cfg…）。其文件会导入到每个匹配桌台的 pinmame 文件夹中。如果没有则留空。"
tables_dir_merge_pupvideos_hint = "现有的 PinUP Player pupvideos 文件夹。匹配的视频会导入到每个桌台的 pupvideos 文件夹中。如果不使用则留空。"
