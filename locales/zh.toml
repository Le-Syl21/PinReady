tilt_nudge_type_help = "驱动 nudge 的传感器类型。\n• 游戏手柄：使用摇杆位置——适用于游戏手柄，而非机柜加速度计。\n• 意图传感器（推荐）：读取加速度计以估算你的 nudge 意图，再应用 VPX 物理效果——最适合 Pinscape/KL25Z 板。\n• 机柜传感器：将原始加速度直接应用到游戏——仅适用于配备高频率、低延迟、无噪声传感器的真实机柜。"
