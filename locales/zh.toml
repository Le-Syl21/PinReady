screens_vpx_install_button_hint = "下载上方显示的版本并将其安装到下方的文件夹中。"
screens_vpx_browse_dir_hint = "选择将安装 Visual Pinball X 的文件夹。"
screens_vpx_manual_hint = "使用你自己已经安装好的 Visual Pinball X，而不是下载一个。"
screens_vpx_exe_hint = "指向你现有 VPinballX_BGFX 可执行文件的路径。"
screens_vpx_browse_exe_hint = "在你的磁盘上定位 VPinballX_BGFX 可执行文件。"
screens_count_hint = "你的配置使用多少个显示器。\n• 台式电脑：通常为 1 个。\n• 完整 pincab：3 或 4 个（游戏台面、背景玻璃、DMD，以及可选的顶饰）。"
screens_mode_desktop_hint = "适用于普通台式机显示器的单屏视图。桌台以标准正面角度显示。"
screens_mode_cabinet_hint = "适用于真实 pincab 的机柜视图：桌面按平放的屏幕渲染，背景玻璃和 DMD 位于独立的显示器上。"
screens_mode_fss_hint = "Full Single Screen：桌面和背景玻璃堆叠在一块竖长的屏幕上。当你只有一块竖屏显示器时使用。"
screens_disable_touch_hint = "关闭 VPX 显示的屏幕触摸叠加层。如果你弹球机的台面不是触摸屏，请启用此选项——尤其是当你远程操控机器时（RustDesk、VNC、TeamViewer…）：否则远程指针可能被当作触摸输入，在 VPX 中触发意外操作。"
screens_physical_size_hint = "此屏幕的物理宽度和高度（毫米）。VPX 用它将桌台缩放到实际尺寸。可用时会从显示器的 EDID 自动填充。"
screens_role_hint = "此屏幕在 VPX 中显示的内容：桌面、背景玻璃、DMD 或顶饰。保持为「未使用」以忽略该显示器。"
screens_cab_lockbar_width_hint = "机柜锁杆（前挡杆）的宽度。用于将屏幕上的球缩放到你机柜的实际尺寸。"
screens_cab_lockbar_height_hint = "锁杆距地面的高度。与你的眼睛高度结合，确定观看桌面的视角。"
screens_cab_inclination_hint = "桌面屏幕的倾斜角度。将其调整为你机柜桌面玻璃的实际坡度。"
screens_cab_player_height_hint = "你站立时的身高。用于计算你的眼睛位置以获得正确的透视效果。"
screens_cab_player_distance_hint = "你距锁杆的距离（前后方向）。负值表示在锁杆后方，正值表示前倾越过锁杆。"
screens_cab_player_offset_hint = "你相对于机柜中心的左右偏移。除非你站在某一侧，否则保持为 0。"
rendering_aa_hint = "超采样以更高的内部分辨率渲染桌台再缩小，从而平滑锯齿边缘。\n• 高于 1.0：锐化图像，但消耗 GPU。\n• 低于 1.0：在性能较弱的机器上提升帧率。"
rendering_msaa_hint = "多重采样抗锯齿可平滑几何边缘，如坡道和线框。数值越高画面越干净但更耗 GPU。如果超采样或 FXAA 已处理锯齿，则可关闭。"
rendering_fxaa_hint = "后处理抗锯齿在渲染后平滑整个图像，GPU 开销极低。更强的模式能平滑更多边缘，但可能略微模糊桌面。低端硬件的不错选择。"
rendering_sharpen_hint = "锐化可抵消抗锯齿或超采样造成的柔化，使插件灯和文字更清晰。如果图像看起来略有模糊则启用它。如果已经很清晰则关闭。"
rendering_reflections_hint = "控制桌面反射的内容：球、静态部件或动态物体。反射越多画面越丰富但更耗 GPU。如果在繁忙桌台上帧率下降，请降低此项。"
rendering_tex_size_hint = "限制 VPX 加载的最大纹理分辨率。默认值（16384）保留完整细节。仅当显存有限的 GPU 内存不足或卡顿时才降低它。"
inputs_pinscape_profile_hint = "选择与你的弹球控制器板匹配的配置文件（KL25Z、Pico、DudesCab 或 PinOne）。它会用该板的出厂按钮布局填充摇杆列。选择「无」以清除这些默认值并自行映射每个按钮。"
inputs_gamepad_hint = "启用此项以使用检测到的游戏手柄浏览 PinReady 并进行游戏内操作。如果你只用键盘或专用弹球控制器游玩，请将其关闭。"
inputs_auto_map_hint = "逐一遍历每个操作：为每个操作按下你想要的按键或控制器按钮。一次性设置所有控制的最快方法。"
inputs_auto_map_skip_hint = "保持此操作当前的绑定不变，继续下一个。"
