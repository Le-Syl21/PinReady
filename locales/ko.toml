tilt_nudge_type_help = "nudge를 구동하는 센서 종류입니다.\n• 게임 컨트롤러: 스틱 위치를 사용합니다 — 게임패드용이며 캐비닛 가속도계용이 아닙니다.\n• 의도 센서(Intent Sensor) (권장): 가속도계를 읽어 nudge 의도를 추정한 뒤 VPX 물리를 적용합니다 — Pinscape/KL25Z 보드에 가장 적합합니다.\n• 캐비닛 센서(Cabinet Sensor): 원시 가속도를 게임에 직접 적용합니다 — 고주파, 저지연, 노이즈 없는 센서를 갖춘 실제 캐비닛에만 사용하세요."
tilt_show_plumb = "게임 내 nudge 표시(추(plumb) 오버레이)"
tilt_show_plumb_help = "VPX의 추(plumb bob)를 표시합니다 — FPS 오버레이 근처, 원 안의 점으로 nudge할 때 움직여 nudge가 작동하는지 확인할 수 있습니다. (VPX 설정: SimulatedPlumb.)"
screens_language_hint = "PinReady의 인터페이스 언어입니다. Visual Pinball 자체의 언어는 변경하지 않습니다."
screens_vpx_auto_hint = "PinReady와 함께 테스트된 Visual Pinball X 포크(Le-Syl21/vpinball 저장소)의 최신 빌드를 다운로드하여 설치합니다 — 공식 VPX가 아닙니다. VPX가 아직 설치되어 있지 않다면 권장합니다."
screens_vpx_install_button_hint = "위에 표시된 버전을 다운로드하여 아래 폴더에 설치합니다."
screens_vpx_browse_dir_hint = "Visual Pinball X를 설치할 폴더를 선택하세요."
screens_vpx_manual_hint = "다운로드하는 대신 직접 이미 설치한 Visual Pinball X를 사용합니다."
screens_vpx_exe_hint = "기존 VPinballX_BGFX 실행 파일의 경로입니다."
screens_vpx_browse_exe_hint = "디스크에서 VPinballX_BGFX 실행 파일을 찾으세요."
screens_count_hint = "설치 환경에서 사용하는 디스플레이 수입니다.\n• 데스크톱 컴퓨터: 보통 1개.\n• 완전한 핀캡: 3~4개(플레이필드, 백글래스, DMD, 그리고 선택적 토퍼)."
screens_mode_desktop_hint = "일반 데스크톱 모니터용 단일 화면 뷰입니다. 테이블이 표준 정면 각도로 표시됩니다."
screens_mode_cabinet_hint = "실제 핀캡용 캐비닛 뷰: 플레이필드는 평평하게 눕힌 화면용으로 렌더링되며, 백글래스와 DMD는 별도 디스플레이에 표시됩니다."
screens_mode_fss_hint = "Full Single Screen: 플레이필드와 백글래스를 하나의 세로로 긴 화면에 쌓아 표시합니다. 세로 방향 디스플레이가 하나뿐일 때 사용하세요."
screens_disable_touch_hint = "VPX의 화면 터치 오버레이를 끕니다. 플레이필드가 비터치 화면인 핀캡에서 이 옵션을 켜세요 — 특히 기기를 원격으로 제어하는 경우(RustDesk, VNC, TeamViewer…)에 그렇습니다: 원격 포인터가 터치 입력으로 인식되어 VPX에서 의도치 않은 동작을 일으킬 수 있습니다."
screens_physical_size_hint = "이 화면의 물리적 가로·세로 크기(밀리미터)입니다. VPX는 이를 사용해 테이블을 실제 크기로 스케일링합니다. 가능하면 모니터의 EDID에서 자동 입력됩니다."
screens_role_hint = "이 화면이 VPX에서 표시하는 내용: 플레이필드, 백글래스, DMD 또는 토퍼. 해당 디스플레이를 무시하려면 사용 안 함으로 두세요."
screens_cab_lockbar_width_hint = "캐비닛 락바(전면 레일)의 너비입니다. 화면에 표시되는 공을 캐비닛의 실제 크기에 맞춰 스케일링하는 데 사용됩니다."
screens_cab_lockbar_height_hint = "바닥에서 락바까지의 높이입니다. 눈높이와 결합되어 플레이필드를 바라보는 시야각을 결정합니다."
screens_cab_inclination_hint = "플레이필드 화면의 기울기 각도입니다. 캐비닛 플레이필드 유리의 실제 경사에 맞추세요."
screens_cab_player_height_hint = "서 있을 때의 키입니다. 올바른 원근감을 위해 눈 위치를 계산하는 데 사용됩니다."
screens_cab_player_distance_hint = "락바에서 얼마나 떨어져 서 있는지(앞뒤 거리)입니다. 음수는 락바 뒤쪽, 양수는 락바 위로 기댄 상태입니다."
screens_cab_player_offset_hint = "캐비닛 중앙 기준 좌우 오프셋입니다. 한쪽으로 치우쳐 서지 않는 한 0으로 두세요."
rendering_aa_hint = "슈퍼샘플링은 테이블을 더 높은 내부 해상도로 렌더링한 뒤 축소하여 계단 현상을 부드럽게 만듭니다.\n• 1.0 이상: GPU 비용을 들여 이미지를 더 선명하게 합니다.\n• 1.0 미만: 성능이 낮은 컴퓨터에서 프레임레이트를 높입니다."
rendering_msaa_hint = "멀티샘플 안티에일리어싱(MSAA)은 램프와 와이어폼 같은 지오메트리 가장자리를 부드럽게 합니다. 값이 높을수록 깔끔해 보이지만 GPU 부담이 커집니다. 슈퍼샘플링이나 FXAA가 이미 에일리어싱을 처리한다면 꺼 두세요."
rendering_fxaa_hint = "후처리 안티에일리어싱은 렌더링 후 이미지 전체를 부드럽게 하며 GPU 비용이 매우 적습니다. 강한 모드일수록 더 많은 가장자리를 부드럽게 하지만 플레이필드를 약간 흐리게 할 수 있습니다. 저사양 하드웨어에 좋은 선택입니다."
rendering_sharpen_hint = "샤프닝은 안티에일리어싱이나 슈퍼샘플링으로 인한 흐림을 상쇄하여 인서트와 텍스트를 더 또렷하게 만듭니다. 이미지가 약간 흐릿하면 켜고, 이미 선명하면 꺼 두세요."
rendering_reflections_hint = "플레이필드가 무엇을 반사할지 제어합니다: 공, 정적 부품 또는 동적 오브젝트. 반사가 많을수록 화면이 풍부해 보이지만 GPU 비용이 듭니다. 복잡한 테이블에서 프레임레이트가 떨어지면 낮추세요."
rendering_tex_size_hint = "VPX가 로드하는 최대 텍스처 해상도를 제한합니다. 기본값(16384)은 전체 디테일을 유지합니다. 비디오 메모리가 부족한 GPU에서 메모리가 부족하거나 끊길 때만 낮추세요."
inputs_pinscape_profile_hint = "핀볼 컨트롤러 보드에 맞는 프로필(KL25Z, Pico, DudesCab 또는 PinOne)을 선택하세요. 해당 보드의 공장 기본 버튼 배치로 조이스틱 열을 채웁니다. 이 기본값을 지우고 모든 버튼을 직접 매핑하려면 없음을 선택하세요."
inputs_gamepad_hint = "감지된 게임패드로 PinReady를 탐색하고 게임 내 동작에 사용하려면 이 옵션을 켜세요. 키보드나 전용 핀볼 컨트롤러로만 플레이한다면 끄세요."
inputs_auto_map_hint = "모든 동작을 하나씩 진행합니다: 각 동작에 원하는 키나 컨트롤러 버튼을 누르세요. 한 번에 모든 컨트롤을 설정하는 가장 빠른 방법입니다."
inputs_auto_map_skip_hint = "이 동작의 현재 바인딩을 변경하지 않고 다음 동작으로 넘어갑니다."
inputs_auto_map_cancel_hint = "가이드 매핑을 지금 중지합니다. 이번 진행에서 이미 캡처한 바인딩은 유지됩니다."
inputs_map_hint = "클릭한 뒤 키나 컨트롤러 버튼을 눌러 이 동작에 바인딩하세요. 키는 키보드 열을, 컨트롤러 버튼은 조이스틱 열을 채웁니다. 둘 다 함께 존재할 수 있습니다."
outputs_open_folder_hint = "DOF가 구성을 찾는 폴더를 엽니다. 생성기에서 받은 zip을 여기에 압축 해제한 뒤 VPX를 재시작하여 구성을 적용하세요."
outputs_dof_disable_hint = "VPinballX.ini에서 DOF 플러그인을 다시 끕니다. 솔레노이드, 플래셔, 셰이커가 게임 내에서 더 이상 반응하지 않습니다."
outputs_dof_activate_hint = "DOF 플러그인에 Enable = 1을 기록하여 VPX가 출력 하드웨어를 구동하게 합니다. DOF 구성을 생성하고 압축 해제한 뒤에만 유용합니다."
outputs_discover_ack_hint = "이 테스트가 솔레노이드와 모터를 실제로 작동시킨다는 점을 이해했음을 확인합니다. 스캔 및 시뮬레이터 버튼을 잠금 해제하려면 체크하세요."
outputs_discover_scan_hint = "연결된 출력 컨트롤러(Pinscape 등)를 USB로 찾아 각 출력을 하나씩 펄스로 테스트할 수 있게 합니다."
outputs_discover_simulator_hint = "가상의 22출력 보드를 대상으로 디스커버리 흐름을 실행합니다. 하드웨어 없이 인터페이스를 안전하게 시험하는 방법입니다."
outputs_discover_start_hardware_hint = "감지된 보드를 열고 출력을 펄스로 작동시켜 어떤 핀이 캐비닛의 어떤 장치를 구동하는지 확인할 수 있게 합니다."
outputs_discover_copy_udev_hint = "udev 규칙을 클립보드에 복사하여 규칙 파일에 붙여넣고 루트 없이 HID에 접근할 수 있게 합니다."
outputs_discover_pulse_stop_hint = "현재 출력의 자동 펄스 루프를 중지합니다."
outputs_discover_pulse_start_hint = "선택한 출력을 반복적으로 펄스로 작동시켜 캐비닛의 어떤 장치를 작동시키는지 확인할 수 있게 합니다."
outputs_discover_replay_hint = "어떤 장치가 반응했는지 놓쳤다면 현재 출력의 펄스 루프를 다시 시작합니다."
outputs_discover_prev_hint = "이전 출력 번호로 돌아가 테스트하고 라벨을 붙입니다."
outputs_discover_next_hint = "다음 출력 번호로 넘어가 테스트하고 라벨을 붙입니다."
outputs_discover_label_hint = "이 출력에 연결된 장치의 이름을 지정하세요(예: 왼쪽 플리퍼, 셰이커). 이 라벨은 DOF 생성기에 붙여넣을 요약을 구성합니다."
outputs_discover_copy_hint = "라벨이 붙은 출력의 번호 목록을 클립보드에 복사하여 configtool.vpuniverse.com을 채울 때 참고 자료로 사용합니다."
outputs_discover_end_session_hint = "디스커버리 세션을 종료하고 현재 출력 라벨을 지웁니다. 아직 요약이 필요하면 먼저 복사하세요."
audio_device_bg_hint = "음악, 콜아웃, 일반 게임 사운드(백글래스 쪽)에 사용하는 사운드 카드나 스피커입니다. 이 사운드를 별도 출력으로 라우팅하지 않는 한 기본값으로 두세요."
audio_device_pf_hint = "기계식 플레이필드 사운드(플리퍼, 범퍼, 공 구르는 소리)에 사용하는 사운드 카드나 스피커입니다. 서라운드나 SSF의 경우 반드시 멀티채널 출력이어야 합니다."
audio_mode_front_stereo_hint = "두 스피커를 모두 캐비닛 앞쪽에 두는 일반 스테레오입니다. 공간 효과가 없는 가장 단순한 구성입니다."
audio_mode_rear_stereo_hint = "두 스피커를 플레이필드 뒤쪽, 락바 근처에 두는 일반 스테레오입니다. 스피커가 플레이어 가까이에만 있을 때 사용하세요."
audio_mode_surround_rear_hint = "리어 채널을 락바 위치에 배치하는 5.1 서라운드입니다. 6채널 사운드 카드가 필요합니다."
audio_mode_surround_front_hint = "프런트 채널을 락바 위치에 배치하는 5.1 서라운드입니다. 스피커의 실제 배선에 맞는 쪽을 선택하세요."
audio_mode_ssf_legacy_hint = "이전 방식 믹싱을 사용하는 Surround Sound Feedback입니다. SSF는 플레이필드 익사이터를 사용해 소리가 공에서 나오는 것처럼 느껴지게 합니다. 먼저 New 방식을 시도해 보세요."
audio_mode_ssf_new_hint = "더 새롭고 권장되는 믹싱을 사용하는 Surround Sound Feedback입니다. 7.1 익사이터를 갖춘 완전한 SSF 캐비닛에서 최고의 몰입감을 제공합니다."
audio_music_volume_hint = "백글래스 출력의 음악, 콜아웃, 게임 사운드 전체 레벨입니다(VPX MusicVolume)."
audio_sound_volume_hint = "플레이필드 출력의 기계식 플레이필드 사운드 레벨입니다(VPX SoundVolume)."
audio_test_music_btn_hint = "백글래스 장치에서 반복 재생되는 음악 트랙을 재생하여 소리가 들리는지, 좌우 배선이 올바른지 확인합니다."
audio_pan_hint = "드래그하여 테스트 음악을 좌우 백글래스 스피커 사이로 이동시켜 좌우가 바뀌지 않았는지 확인하세요."
audio_speaker_test_hint = "이 스피커에서만 테스트 사운드를 재생하여 캐비닛의 해당 코너에 배선되어 있는지 확인합니다."
audio_ball_top_bottom_hint = "공 구르는 소리를 앞쪽 스피커에서 락바 쪽으로 이동시킵니다. 움직임이 반대로 느껴지면 위의 출력 모드를 바꾸세요."
audio_ball_left_right_hint = "공 구르는 소리를 왼쪽 스피커에서 오른쪽으로 이동시킵니다. 방향이 잘못되었다면 좌우 배선을 확인하세요."
tables_dir_path_hint = "테이블마다 하위 폴더 하나를 담는 루트 폴더입니다(VPX 10.8의 테이블당 폴더 구조). PinReady가 이를 스캔하여 테이블 목록을 구성합니다."
tables_dir_browse_hint = "경로를 직접 입력하는 대신 폴더 선택기를 열어 테이블 디렉터리를 선택합니다."
tables_dir_merge_vpinmame_hint = "기존 VPinMAME 폴더(roms, nvram, cfg…)입니다. 해당 파일은 매칭되는 각 테이블의 pinmame 폴더로 가져옵니다. 없다면 비워 두세요."
tables_dir_merge_pupvideos_hint = "기존 PinUP Player pupvideos 폴더입니다. 매칭되는 영상은 각 테이블의 pupvideos 폴더로 가져옵니다. 사용하지 않으면 비워 두세요."
tables_dir_merge_music_hint = "기존 음악 폴더입니다. 매칭되는 트랙은 각 테이블의 music 폴더로 가져옵니다. 사용하지 않으면 비워 두세요."
tables_dir_merge_strategy_copy_hint = "소스 파일을 테이블 디렉터리로 복제하고 원본을 유지합니다. 가장 안전한 선택이지만 디스크 공간을 가장 많이 사용합니다."
tables_dir_merge_strategy_move_hint = "파일을 테이블 디렉터리로 이동하고 소스에서 제거합니다. 디스크 공간을 절약하지만 원본 폴더가 비워집니다."
tables_dir_merge_strategy_symlink_hint = "복사하는 대신 원본을 가리키는 링크를 만듭니다. 디스크 공간을 거의 사용하지 않지만 소스 폴더가 제자리에 남아 있어야 합니다."
tables_dir_merge_dry_run_hint = "소스를 스캔하여 어떤 파일이 가져와질지 나열하되 어떤 파일도 변경하지 않습니다. 결과를 미리 보려면 먼저 실행하세요."
tables_dir_merge_apply_hint = "드라이런의 계획을 사용해 실제로 가져오기를 수행합니다. 선택한 전략에 따라 파일이 복사, 이동 또는 링크됩니다."
tables_dir_merge_cancel_hint = "진행 중인 가져오기를 중지합니다. 이미 가져온 파일은 유지됩니다."
system_mirror_clear_hint = "자체 호스팅 미러 URL을 지우고 GitHub에서 직접 다운로드하도록 복원합니다. 미러가 오프라인이거나 더 이상 운영하지 않을 때 사용하세요."
