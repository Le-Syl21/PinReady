tables_dir_merge_music_hint = "โฟลเดอร์เพลงที่มีอยู่ แทร็กที่ตรงกันจะถูกนำเข้าไปยังโฟลเดอร์ music ของแต่ละโต๊ะ ปล่อยว่างไว้หากไม่ได้ใช้"
tables_dir_merge_strategy_copy_hint = "ทำสำเนาไฟล์ต้นทางลงในไดเรกทอรีโต๊ะของคุณและคงต้นฉบับไว้ ตัวเลือกที่ปลอดภัยที่สุด แต่ใช้พื้นที่ดิสก์มากที่สุด"
tables_dir_merge_strategy_move_hint = "ย้ายไฟล์ไปยังไดเรกทอรีโต๊ะของคุณและลบออกจากต้นทาง ประหยัดพื้นที่ดิสก์แต่ทำให้โฟลเดอร์ต้นฉบับว่างเปล่า"
tables_dir_merge_strategy_symlink_hint = "สร้างลิงก์ที่ชี้ไปยังต้นฉบับแทนการคัดลอก ใช้พื้นที่ดิสก์แทบไม่มีเลย แต่โฟลเดอร์ต้นทางต้องคงอยู่ที่เดิม"
tables_dir_merge_dry_run_hint = "สแกนต้นทางและแสดงรายการสิ่งที่จะถูกนำเข้าโดยไม่เปลี่ยนแปลงไฟล์ใดๆ รันสิ่งนี้ก่อนเพื่อดูตัวอย่างผลลัพธ์"
tables_dir_merge_apply_hint = "ดำเนินการนำเข้าจริง โดยใช้แผนจากการรันจำลอง ไฟล์จะถูกคัดลอก ย้าย หรือลิงก์ตามกลยุทธ์ที่คุณเลือก"
tables_dir_merge_cancel_hint = "หยุดการนำเข้าที่กำลังดำเนินอยู่ ไฟล์ที่นำเข้าไปแล้วจะถูกเก็บไว้"
system_mirror_clear_hint = "ล้าง URL ของมิเรอร์ที่โฮสต์เองและคืนค่าการดาวน์โหลดโดยตรงจาก GitHub ใช้สิ่งนี้หากมิเรอร์ออฟไลน์หรือคุณไม่ได้รันมันอีกต่อไป"
