tables_catalog_desc = "Koppelt elke geïnstalleerde tafel aan de Virtual Pinball Spreadsheet-catalogus (~2500 games) en downloadt backglass (bg.png) + audio-jingle (audio.mp3) uit VPinMediaDB naar <table>/medias/. De eerste synchronisatie brengt ~7 MB catalogus-JSON over plus enkele MB per herkende tafel. Nodig voor hovervoorbeeld en 'update beschikbaar'-badges in het launcherraster. Standaard aan — schakel uit op offline of datalimiet-pincabs."
