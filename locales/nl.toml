tilt_nudge_type = "Type nudge-sensor:"
tilt_nudge_type_game = "Gamecontroller"
tilt_nudge_type_intent = "Intentiesensor"
tilt_nudge_type_cabinet = "Cabinetsensor"
tilt_nudge_type_help = "Gamecontroller: gebruikt de stickpositie — voor gamepads, niet voor cabinet-accelerometers. Intentiesensor (aanbevolen): leest de accelerometer om je nudge-intentie in te schatten en past daarna de VPX-fysica toe — het beste voor Pinscape/KL25Z-boards. Cabinetsensor: koppelt de ruwe versnelling rechtstreeks aan de geëmuleerde nudge — alleen voor een echte cabinet met een hoogfrequente, lagelatentie en ruisvrije sensor."
tilt_show_plumb = "Nudge in-game tonen (schietlood-overlay)"
tilt_show_plumb_help = "Toont het schietlood van VPX — een stip in een cirkel, naast de FPS-overlay — dat beweegt wanneer je nudget, zodat je kunt controleren of nudge werkt. (VPX-instelling: SimulatedPlumb.)"
screens_language_hint = "Interfacetaal voor PinReady. Dit verandert niet de eigen taal van Visual Pinball."
screens_vpx_auto_hint = "Download en installeer automatisch de nieuwste build van Visual Pinball X. Aanbevolen als je VPX nog niet hebt geïnstalleerd."
screens_vpx_install_button_hint = "Download de hierboven getoonde versie en installeer die in de onderstaande map."
screens_vpx_browse_dir_hint = "Kies de map waarin Visual Pinball X wordt geïnstalleerd."
screens_vpx_manual_hint = "Gebruik een Visual Pinball X die je zelf al hebt geïnstalleerd in plaats van er een te downloaden."
screens_vpx_exe_hint = "Pad naar je bestaande VPinballX_BGFX-programma."
screens_vpx_browse_exe_hint = "Zoek het VPinballX_BGFX-programma op je schijf."
screens_count_hint = "Hoeveel schermen je opstelling gebruikt. Een desktop heeft er meestal 1; een volledige pincab 3 of 4 (playfield, backglass, DMD en een optionele topper)."
screens_mode_desktop_hint = "Weergave op één scherm voor een gewone desktopmonitor. De tafel wordt vanuit een standaard vooraanzicht getoond."
screens_mode_cabinet_hint = "Cabinetweergave voor een echte pincab: het playfield wordt gerenderd voor een plat liggend scherm, met backglass en DMD op aparte schermen."
screens_mode_fss_hint = "Full Single Screen: playfield en backglass gestapeld op één hoog scherm. Gebruik dit als je één scherm in portretmodus hebt."
screens_disable_touch_hint = "Schakel de touch-overlay op het scherm van VPX uit. Zet dit aan op een pincab waarvan het playfield geen touchscreen is."
screens_physical_size_hint = "Fysieke breedte en hoogte van dit scherm in millimeter. VPX gebruikt dit om de tafel op ware grootte te schalen; automatisch ingevuld vanuit de EDID van de monitor indien beschikbaar."
screens_role_hint = "Wat dit scherm toont in VPX: Playfield, Backglass, DMD of Topper. Laat op Ongebruikt staan om het scherm te negeren."
screens_cab_lockbar_width_hint = "Breedte van de lockbar van de cabinet (de voorbalk). Wordt gebruikt om de bal op het scherm te schalen naar de werkelijke grootte van je cabinet."
screens_cab_lockbar_height_hint = "Hoogte van de lockbar boven de vloer. Samen met je ooghoogte bepaalt dit de kijkhoek op het playfield."
screens_cab_inclination_hint = "Kantelhoek van het playfield-scherm. Stem die af op de werkelijke helling van het playfield-glas van je cabinet."
screens_cab_player_height_hint = "Je lichaamslengte staand. Wordt gebruikt om je oogpositie te berekenen voor een correct perspectief."
screens_cab_player_distance_hint = "Hoe ver je van de lockbar staat (voor-naar-achter). Negatief is achter de lockbar, positief is eroverheen leunend."
screens_cab_player_offset_hint = "Je links/rechts-verschuiving ten opzichte van het midden van de cabinet. Laat op 0 staan tenzij je aan een kant staat."
rendering_aa_hint = "Supersampling rendert de tafel op een hogere interne resolutie en schaalt die omlaag, waardoor gekartelde randen worden gladgestreken. Boven 1.0 verscherpt het beeld ten koste van de GPU; onder 1.0 verhoogt de framerate op zwakkere machines."
rendering_msaa_hint = "Multisample-antialiasing strijkt de randen van geometrie zoals ramps en wireforms glad. Hogere waarden zien er strakker uit maar kosten meer GPU; laat het uit als supersampling of FXAA de aliasing al aanpakt."
rendering_fxaa_hint = "Antialiasing in nabewerking strijkt het hele beeld na het renderen glad, zeer goedkoop voor de GPU. Sterkere modi verzachten meer randen maar kunnen het playfield licht vervagen; een goede keuze op zwakke hardware."
rendering_sharpen_hint = "Verscherping compenseert de vervaging veroorzaakt door antialiasing of supersampling, waardoor inserts en tekst scherper worden. Zet het aan als het beeld er wat wazig uitziet; laat het uit als het al scherp is."
rendering_reflections_hint = "Bepaalt wat het playfield weerspiegelt: de bal, statische onderdelen of dynamische objecten. Meer reflecties zien er rijker uit maar kosten GPU; verlaag dit als de framerate daalt op drukke tafels."
rendering_tex_size_hint = "Begrenst de maximale textuurresolutie die VPX laadt. De standaard (16384) behoudt alle details; verlaag die alleen als een GPU met beperkt videogeheugen vol raakt of hapert."
inputs_pinscape_profile_hint = "Kies het profiel dat past bij je pinball-controllerboard (KL25Z, Pico, DudesCab of PinOne). Het vult de joystickkolom met de standaard knopindeling van dat board. Kies Geen om die standaardwaarden te wissen en elke knop zelf toe te wijzen."
inputs_gamepad_hint = "Zet dit aan om de gedetecteerde gamepad te gebruiken voor het navigeren in PinReady en voor acties in het spel. Zet het uit als je alleen met een toetsenbord of een speciale pinball-controller speelt."
inputs_auto_map_hint = "Loop elke actie één voor één door: druk voor elke actie op de gewenste toets of controllerknop. De snelste manier om al je bediening in één keer in te stellen."
inputs_auto_map_skip_hint = "Laat de huidige toewijzing van deze actie ongewijzigd en ga door naar de volgende."
inputs_auto_map_cancel_hint = "Stop het begeleide toewijzen nu. Toewijzingen die tijdens deze doorloop al zijn vastgelegd, blijven behouden."
inputs_map_hint = "Klik en druk daarna op een toets of controllerknop om die aan deze actie toe te wijzen. Een toets vult de toetsenbordkolom, een controllerknop vult de joystickkolom; beide kunnen naast elkaar bestaan."
outputs_open_folder_hint = "Opent de map waarin DOF zijn configuratie zoekt. Pak hier de zip van de generator uit en herstart daarna VPX zodat het de configuratie oppikt."
outputs_dof_disable_hint = "Zet de DOF-plugin weer uit in VPinballX.ini. Je solenoïdes, flashers en shakers reageren dan niet meer in het spel."
outputs_dof_activate_hint = "Schrijft Enable = 1 voor de DOF-plugin zodat VPX je uitvoerhardware aanstuurt. Alleen nuttig zodra je DOF-configuratie is gegenereerd en uitgepakt."
outputs_discover_ack_hint = "Bevestigt dat je begrijpt dat de test fysiek solenoïdes en motoren aanstuurt. Vink dit aan om de scan- en simulatorknoppen te ontgrendelen."
outputs_discover_scan_hint = "Zoekt via USB naar aangesloten uitvoercontrollers (Pinscape, enz.) zodat je hun uitgangen één voor één kunt pulsen."
outputs_discover_simulator_hint = "Voert het ontdekkingsproces uit op een nep-board met 22 uitgangen. Een veilige manier om de interface te proberen zonder aangesloten hardware."
outputs_discover_start_hardware_hint = "Opent het gedetecteerde board en begint zijn uitgangen te pulsen zodat je kunt noteren welke pin welk apparaat op de cabinet aanstuurt."
outputs_discover_copy_udev_hint = "Kopieert de udev-regels naar het klembord zodat je ze in een regelbestand kunt plakken voor HID-toegang zonder root."
outputs_discover_pulse_stop_hint = "Stopt de automatische pulslus op de huidige uitgang."
outputs_discover_pulse_start_hint = "Pulst herhaaldelijk de geselecteerde uitgang zodat je kunt zien welk apparaat die op de cabinet activeert."
outputs_discover_replay_hint = "Herstart de pulslus op de huidige uitgang als je gemist hebt welk apparaat reageerde."
outputs_discover_prev_hint = "Gaat terug naar het vorige uitgangsnummer om het te testen en te labelen."
outputs_discover_next_hint = "Gaat door naar het volgende uitgangsnummer om het te testen en te labelen."
outputs_discover_label_hint = "Benoem het apparaat dat op deze uitgang is aangesloten (bijv. Linkerflipper, Shaker). Deze labels vormen het overzicht dat je in de DOF-generator plakt."
outputs_discover_copy_hint = "Kopieert de genummerde lijst van je gelabelde uitgangen naar het klembord, als referentie bij het invullen van configtool.vpuniverse.com."
outputs_discover_end_session_hint = "Beëindigt de ontdekkingssessie en wist de huidige uitgangslabels. Kopieer eerst het overzicht als je het nog nodig hebt."
audio_device_bg_hint = "Geluidskaart of luidsprekers voor muziek, callouts en algemene spelgeluiden (de backglass-kant). Laat op standaard staan tenzij je deze naar een aparte uitgang stuurt."
audio_device_pf_hint = "Geluidskaart of luidsprekers voor mechanische playfield-geluiden (flippers, bumpers, rollende bal). Voor surround of SSF moet dit de meerkanaalsuitgang zijn."
audio_mode_front_stereo_hint = "Gewone stereo met beide luidsprekers vóór de cabinet. De eenvoudigste opstelling, zonder ruimtelijke effecten."
audio_mode_rear_stereo_hint = "Gewone stereo met de twee luidsprekers achter het playfield, bij de lockbar. Gebruik dit als je enige luidsprekers dicht bij de speler staan."
audio_mode_surround_rear_hint = "5.1-surround met de achterkanalen bij de lockbar. Vereist een geluidskaart met 6 kanalen."
audio_mode_surround_front_hint = "5.1-surround met de voorkanalen bij de lockbar. Kies degene die overeenkomt met hoe je luidsprekers fysiek zijn bedraad."
audio_mode_ssf_legacy_hint = "Surround Sound Feedback met de oudere mixing. SSF gebruikt exciters op het playfield zodat geluiden lijken te komen van de bal; probeer eerst de Nieuw-variant."
audio_mode_ssf_new_hint = "Surround Sound Feedback met de nieuwere, aanbevolen mixing. De beste immersie op een volledige SSF-cabinet met 7.1-exciters."
audio_music_volume_hint = "Algemeen niveau van muziek, callouts en spelgeluiden op de backglass-uitgang (VPX MusicVolume)."
audio_sound_volume_hint = "Niveau van de mechanische playfield-geluiden op de playfield-uitgang (VPX SoundVolume)."
audio_test_music_btn_hint = "Speelt een muziektrack in een lus af op het backglass-apparaat zodat je kunt controleren of die hoorbaar is en correct links/rechts is bedraad."
audio_pan_hint = "Sleep om de testmuziek tussen de linker- en rechter-backglassluidspreker te verschuiven, om te bevestigen dat ze niet verwisseld zijn."
audio_speaker_test_hint = "Speelt een testgeluid af op alleen deze luidspreker, zodat je kunt bevestigen dat hij op de bijbehorende hoek van de cabinet is bedraad."
audio_ball_top_bottom_hint = "Laat een rollende-balgeluid van de voorluidsprekers naar de lockbar glijden. Als de beweging omgekeerd aanvoelt, wijzig dan de uitvoermodus hierboven."
audio_ball_left_right_hint = "Laat een rollende-balgeluid van de linkerluidsprekers naar de rechter glijden. Als de richting verkeerd is, controleer dan je links/rechts-bedrading."
tables_dir_path_hint = "Hoofdmap met één submap per tafel (VPX 10.8-indeling met een map per tafel). PinReady scant die om je tafellijst op te bouwen."
tables_dir_browse_hint = "Open een mapkiezer om je tafelmap te kiezen in plaats van het pad met de hand in te typen."
tables_dir_merge_vpinmame_hint = "Bestaande VPinMAME-map (roms, nvram, cfg…). De bestanden worden geïmporteerd in de pinmame-map van elke overeenkomende tafel. Laat leeg als je er geen hebt."
tables_dir_merge_pupvideos_hint = "Bestaande pupvideos-map van PinUP Player. Overeenkomende video's worden geïmporteerd in de pupvideos-map van elke tafel. Laat leeg indien ongebruikt."
tables_dir_merge_music_hint = "Bestaande muziekmap. Overeenkomende tracks worden geïmporteerd in de music-map van elke tafel. Laat leeg indien ongebruikt."
tables_dir_merge_strategy_copy_hint = "Kopieert de bronbestanden naar je tafelmap en behoudt de originelen. De veiligste keuze, maar gebruikt de meeste schijfruimte."
tables_dir_merge_strategy_move_hint = "Verplaatst de bestanden naar je tafelmap en verwijdert ze uit de bron. Bespaart schijfruimte maar leegt de oorspronkelijke mappen."
tables_dir_merge_strategy_symlink_hint = "Maakt koppelingen die naar de originelen wijzen in plaats van te kopiëren. Gebruikt vrijwel geen schijfruimte, maar de bronmappen moeten op hun plaats blijven."
tables_dir_merge_dry_run_hint = "Scant de bronnen en toont wat er geïmporteerd zou worden, zonder bestanden te wijzigen. Voer dit eerst uit om het resultaat te bekijken."
tables_dir_merge_apply_hint = "Voert de import echt uit, op basis van het plan uit de simulatie. Bestanden worden gekopieerd, verplaatst of gekoppeld volgens de door jou gekozen strategie."
tables_dir_merge_cancel_hint = "Stopt de lopende import. Reeds geïmporteerde bestanden blijven behouden."
system_mirror_clear_hint = "Wist de URL van de zelf-gehoste mirror en herstelt directe downloads van GitHub. Gebruik dit als de mirror offline is of je er geen meer draait."
