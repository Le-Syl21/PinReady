screens_count_hint = "Koľko displejov používa vaša zostava. Stolný počítač má zvyčajne 1; plný pincab má 3 alebo 4 (hracia plocha, backglass, DMD a voliteľný topper)."
screens_mode_desktop_hint = "Zobrazenie na jednej obrazovke pre bežný stolný monitor. Stôl je zobrazený zo štandardného čelného uhla."
screens_mode_cabinet_hint = "Zobrazenie cabinetu pre skutočný pincab: hracia plocha sa vykresľuje pre obrazovku položenú naplocho, s backglassom a DMD na samostatných displejoch."
screens_mode_fss_hint = "Full Single Screen: hracia plocha a backglass naskladané na jednej vysokej obrazovke. Použite to, keď máte jeden displej na výšku."
screens_disable_touch_hint = "Vypne dotykové prekrytie na obrazovke vo VPX. Zapnite to na pincabe, ktorého hracia plocha nie je dotyková obrazovka."
screens_physical_size_hint = "Fyzická šírka a výška tejto obrazovky v milimetroch. VPX to používa na škálovanie stola na skutočnú veľkosť; automaticky vyplnené z EDID monitora, ak je dostupné."
screens_role_hint = "Čo táto obrazovka zobrazuje vo VPX: hraciu plochu, backglass, DMD alebo topper. Ponechajte na Nepoužité, ak chcete displej ignorovať."
screens_cab_lockbar_width_hint = "Šírka lockbaru cabinetu (predná lišta). Používa sa na škálovanie zobrazenej gule voči skutočnej veľkosti vášho cabinetu."
screens_cab_lockbar_height_hint = "Výška lockbaru nad podlahou. V kombinácii s výškou vašich očí určuje uhol pohľadu na hraciu plochu."
screens_cab_inclination_hint = "Uhol náklonu obrazovky hracej plochy. Nastavte ho podľa skutočného sklonu skla hracej plochy vášho cabinetu."
screens_cab_player_height_hint = "Vaša výška v stoji. Používa sa na výpočet polohy vašich očí pre správnu perspektívu."
screens_cab_player_distance_hint = "Ako ďaleko stojíte od lockbaru (spredu dozadu). Záporná hodnota je za lockbarom, kladná je naklonenie ponad neho."
screens_cab_player_offset_hint = "Vaše vychýlenie doľava/doprava od stredu cabinetu. Ponechajte na 0, pokiaľ nestojíte bokom."
rendering_aa_hint = "Supersampling vykresľuje stôl vo vyššom vnútornom rozlíšení a zmenšuje ho, čím vyhladzuje zubaté hrany. Nad 1.0 zostruje obraz za cenu GPU; pod 1.0 zvyšuje snímkovú frekvenciu na slabších strojoch."
rendering_msaa_hint = "Multisample anti-aliasing vyhladzuje hrany geometrie ako rampy a drôtené prvky. Vyššie hodnoty vyzerajú čistejšie, ale viac zaťažujú GPU; nechajte vypnuté, ak supersampling alebo FXAA už zvláda aliasing."
rendering_fxaa_hint = "Post-process anti-aliasing vyhladzuje celý obraz po vykreslení, veľmi lacno na GPU. Silnejšie režimy zmäkčujú viac hrán, ale môžu mierne rozmazať hraciu plochu; dobrá voľba na slabšom hardvéri."
rendering_sharpen_hint = "Zostrenie kompenzuje zmäkčenie spôsobené anti-aliasingom alebo supersamplingom, takže inserty a text sú ostrejšie. Zapnite ho, ak obraz vyzerá mierne rozmazaný; nechajte vypnuté, ak už vyzerá ostrý."
rendering_reflections_hint = "Určuje, čo hracia plocha odráža: guľu, statické časti alebo dynamické objekty. Viac odrazov vyzerá bohatšie, ale stojí GPU; znížte to, ak snímková frekvencia klesá na náročných stoloch."
rendering_tex_size_hint = "Obmedzuje maximálne rozlíšenie textúr, ktoré VPX načíta. Predvolená hodnota (16384) zachováva plný detail; znížte ju len vtedy, ak GPU s obmedzenou video pamäťou dochádza pamäť alebo trhá."
inputs_pinscape_profile_hint = "Vyberte profil zodpovedajúci vašej doske ovládača pinballu (KL25Z, Pico, DudesCab alebo PinOne). Vyplní stĺpec joysticku továrenským rozložením tlačidiel danej dosky. Zvoľte Žiadny, ak chcete tieto predvolené hodnoty vymazať a namapovať každé tlačidlo sami."
inputs_gamepad_hint = "Zapnite túto možnosť, ak chcete použiť detegovaný gamepad na navigáciu v PinReady a na akcie v hre. Vypnite ju, ak hráte iba klávesnicou alebo dedikovaným ovládačom pinballu."
inputs_auto_map_hint = "Prejdite každú akciu jednu po druhej: pri každej stlačte klávesu alebo tlačidlo ovládača, ktoré chcete. Najrýchlejší spôsob, ako nastaviť všetky ovládacie prvky na jeden raz."
inputs_auto_map_skip_hint = "Ponechajte aktuálne priradenie tejto akcie nezmenené a prejdite na ďalšiu."
inputs_auto_map_cancel_hint = "Zastavte sprevádzané mapovanie teraz. Priradenia už zachytené v tomto priebehu sú zachované."
inputs_map_hint = "Kliknite, potom stlačte klávesu alebo tlačidlo ovládača, ktoré chcete priradiť tejto akcii. Klávesa vyplní stĺpec klávesnice, tlačidlo ovládača vyplní stĺpec joysticku; oba môžu existovať súčasne."
outputs_open_folder_hint = "Otvorí priečinok, v ktorom DOF hľadá svoju konfiguráciu. Rozbaľte sem zip z generátora, potom reštartujte VPX, aby konfiguráciu načítal."
outputs_dof_disable_hint = "Znovu vypne plugin DOF vo VPinballX.ini. Vaše solenoidy, flashery a shakery prestanú reagovať v hre."
outputs_dof_activate_hint = "Zapíše Enable = 1 pre plugin DOF, aby VPX riadil váš výstupný hardvér. Užitočné iba potom, ako bola vaša konfigurácia DOF vygenerovaná a rozbalená."
outputs_discover_ack_hint = "Potvrdzuje, že rozumiete, že test fyzicky spúšťa solenoidy a motory. Zaškrtnite to, aby ste odomkli tlačidlá skenovania a simulátora."
outputs_discover_scan_hint = "Hľadá pripojené výstupné ovládače (Pinscape a pod.) cez USB, aby ste mohli ich výstupy pulzovať jeden po druhom."
outputs_discover_simulator_hint = "Spustí proces objavovania proti fiktívnej doske s 22 výstupmi. Bezpečný spôsob, ako vyskúšať rozhranie bez pripojeného hardvéru."
outputs_discover_start_hardware_hint = "Otvorí detegovanú dosku a začne pulzovať jej výstupy, aby ste zaznamenali, ktorý pin riadi ktoré zariadenie na cabinete."
outputs_discover_copy_udev_hint = "Skopíruje pravidlá udev do schránky, aby ste ich mohli vložiť do súboru pravidiel pre prístup k HID bez oprávnení root."
outputs_discover_pulse_stop_hint = "Zastaví automatickú pulzovaciu slučku na aktuálnom výstupe."
outputs_discover_pulse_start_hint = "Opakovane pulzuje vybraný výstup, aby ste zistili, ktoré zariadenie spúšťa na cabinete."
outputs_discover_replay_hint = "Znovu spustí pulzovaciu slučku na aktuálnom výstupe, ak vám uniklo, ktoré zariadenie zareagovalo."
outputs_discover_prev_hint = "Vráti sa na predchádzajúce číslo výstupu, aby ste ho otestovali a označili."
outputs_discover_next_hint = "Prejde na ďalšie číslo výstupu, aby ste ho otestovali a označili."
outputs_discover_label_hint = "Pomenujte zariadenie zapojené na tento výstup (napr. Ľavý flipper, Shaker). Tieto štítky tvoria súhrn, ktorý vložíte do generátora DOF."
outputs_discover_copy_hint = "Skopíruje očíslovaný zoznam vašich označených výstupov do schránky ako referenciu pri vypĺňaní configtool.vpuniverse.com."
outputs_discover_end_session_hint = "Ukončí reláciu objavovania a vymaže aktuálne štítky výstupov. Ak ho ešte potrebujete, najskôr skopírujte súhrn."
audio_device_bg_hint = "Zvuková karta alebo reproduktory používané pre hudbu, hlásenia a všeobecné zvuky hry (strana backglassu). Ponechajte na predvolenom, pokiaľ tieto zvuky nesmerujete na samostatný výstup."
audio_device_pf_hint = "Zvuková karta alebo reproduktory používané pre mechanické zvuky hracej plochy (flippery, bumpery, kotúľanie gule). Pre surround alebo SSF to musí byť viackanálový výstup."
audio_mode_front_stereo_hint = "Jednoduché stereo s oboma reproduktormi pred cabinetom. Najjednoduchšia zostava, bez priestorových efektov."
audio_mode_rear_stereo_hint = "Jednoduché stereo s dvoma reproduktormi za hracou plochou, blízko lockbaru. Použite to, ak sú vaše jediné reproduktory blízko hráča."
audio_mode_surround_rear_hint = "Surround 5.1 so zadnými kanálmi umiestnenými pri lockbare. Vyžaduje 6-kanálovú zvukovú kartu."
audio_mode_surround_front_hint = "Surround 5.1 s prednými kanálmi umiestnenými pri lockbare. Vyberte ten, ktorý zodpovedá fyzickému zapojeniu vašich reproduktorov."
audio_mode_ssf_legacy_hint = "Surround Sound Feedback so starším mixovaním. SSF používa excitery na hracej ploche, aby zvuky pôsobili, akoby prichádzali od gule; najskôr vyskúšajte variant Nový."
audio_mode_ssf_new_hint = "Surround Sound Feedback s novším, odporúčaným mixovaním. Najlepšie ponorenie na plnom SSF cabinete s excitermi 7.1."
audio_music_volume_hint = "Celková úroveň hudby, hlásení a zvukov hry na výstupe backglassu (VPX MusicVolume)."
audio_sound_volume_hint = "Úroveň mechanických zvukov hracej plochy na výstupe hracej plochy (VPX SoundVolume)."
audio_test_music_btn_hint = "Prehráva hudbu v slučke na zariadení backglassu, aby ste overili, že je počuteľná a správne zapojená vľavo/vpravo."
audio_pan_hint = "Ťahaním presuňte testovaciu hudbu medzi ľavým a pravým reproduktorom backglassu, aby ste potvrdili, že nie sú prehodené."
audio_speaker_test_hint = "Prehráva testovací zvuk iba na tomto reproduktore, aby ste potvrdili, že je zapojený do zodpovedajúceho rohu cabinetu."
audio_ball_top_bottom_hint = "Prejde zvuk kotúľajúcej sa gule od predných reproduktorov k lockbaru. Ak pohyb pôsobí obrátene, prepnite režim výstupu vyššie."
audio_ball_left_right_hint = "Prejde zvuk kotúľajúcej sa gule od ľavých reproduktorov k pravým. Ak je smer nesprávny, skontrolujte vaše zapojenie vľavo/vpravo."
tables_dir_path_hint = "Koreňový priečinok, ktorý obsahuje jeden podpriečinok na stôl (rozloženie priečinok na stôl vo VPX 10.8). PinReady ho prehľadá a zostaví váš zoznam stolov."
tables_dir_browse_hint = "Otvorí výber priečinka, aby ste zvolili váš adresár stolov namiesto ručného zadávania cesty."
tables_dir_merge_vpinmame_hint = "Existujúci priečinok VPinMAME (roms, nvram, cfg…). Jeho súbory sa importujú do priečinka pinmame každého zodpovedajúceho stola. Ak žiadny nemáte, nechajte prázdne."
tables_dir_merge_pupvideos_hint = "Existujúci priečinok pupvideos PinUP Playera. Zodpovedajúce videá sa importujú do priečinka pupvideos každého stola. Ak sa nepoužíva, nechajte prázdne."
tables_dir_merge_music_hint = "Existujúci priečinok hudby. Zodpovedajúce skladby sa importujú do priečinka music každého stola. Ak sa nepoužíva, nechajte prázdne."
tables_dir_merge_strategy_copy_hint = "Duplikuje zdrojové súbory do vášho adresára stolov a ponechá originály. Najbezpečnejšia voľba, ale zaberá najviac miesta na disku."
tables_dir_merge_strategy_move_hint = "Presunie súbory do vášho adresára stolov a odstráni ich zo zdroja. Šetrí miesto na disku, ale vyprázdni pôvodné priečinky."
tables_dir_merge_strategy_symlink_hint = "Vytvorí odkazy smerujúce na originály namiesto kopírovania. Nezaberá takmer žiadne miesto na disku, ale zdrojové priečinky musia zostať na mieste."
tables_dir_merge_dry_run_hint = "Prehľadá zdroje a vypíše, čo by sa importovalo, bez zmeny akýchkoľvek súborov. Spustite to najskôr, aby ste si prezreli výsledok."
tables_dir_merge_apply_hint = "Vykoná import naozaj, s použitím plánu z testovacieho behu. Súbory sa skopírujú, presunú alebo prepoja podľa vami zvolenej stratégie."
tables_dir_merge_cancel_hint = "Zastaví prebiehajúci import. Už importované súbory sú zachované."
system_mirror_clear_hint = "Vymaže URL vlastného zrkadla a obnoví priame sťahovania z GitHubu. Použite to, ak je zrkadlo offline alebo ho už neprevádzkujete."
