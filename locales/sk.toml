tables_desc = "Vyberte adresár obsahujúci vaše VPX stoly (jeden priečinok na stôl)."
tables_structure = "Očakávaná štruktúra (priečinok na stôl, Visual Pinball 10.8):"
tables_structure_tree = """
Tables/
└── Table Name/
    ├── Table Name.vpx                <- súbor stola (povinný)
    ├── Table Name.directb2s          <- backglass B2S (voliteľný)
    ├── medias/launcher.png            <- prepis miniatúry launchera (voliteľné, .png/.webp/.jpg/.jpeg)
    ├── Table Name.ini                <- prepisy pre stôl (voliteľné)
    ├── Table Name.vbs                <- patch VBS / prepis skriptu (voliteľné)
    ├── altsound/<rom>/               <- balíček altsound (voliteľný)
    ├── pinmame/
    │   ├── roms/<rom>.zip            <- PinMAME ROM (povinný pre ROM stoly)
    │   └── nvram/<rom>.nv            <- dáta uloženia (automaticky vytvorené)
    ├── pupvideos/<rom>/              <- videá PinUp Player (voliteľné)
    ├── serum/<rom>/<rom>.crz         <- kolorovanie DMD Serum (voliteľné)
    ├── vni/<rom>/<rom>.vni + .pal    <- kolorovanie DMD VNI (voliteľné)
    └── medias/                       <- frontendové médiá (voliteľné)"""
