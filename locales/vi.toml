screens_mode_fss_hint = "Full Single Screen: mặt bàn và backglass xếp chồng trên một màn hình cao. Dùng khi bạn chỉ có một màn hình dọc."
screens_disable_touch_hint = "Tắt lớp phủ cảm ứng trên màn hình của VPX. Bật tùy chọn này trên pincab có mặt bàn là màn hình không cảm ứng."
screens_physical_size_hint = "Chiều rộng và chiều cao vật lý của màn hình này tính bằng milimét. VPX dùng nó để chỉnh tỷ lệ bàn về kích thước thật; tự động điền từ EDID của màn hình khi có sẵn."
screens_role_hint = "Màn hình này hiển thị gì trong VPX: mặt bàn, backglass, DMD hay topper. Để nguyên là Không dùng để bỏ qua màn hình."
screens_cab_lockbar_width_hint = "Chiều rộng của lockbar cabinet (thanh trước). Dùng để chỉnh tỷ lệ bi trên màn hình theo kích thước thật của cabinet."
screens_cab_lockbar_height_hint = "Chiều cao của lockbar so với sàn. Kết hợp với chiều cao mắt của bạn, nó xác định góc nhìn xuống mặt bàn."
screens_cab_inclination_hint = "Góc nghiêng của màn hình mặt bàn. Chỉnh cho khớp với độ dốc thật của kính mặt bàn cabinet của bạn."
screens_cab_player_height_hint = "Chiều cao đứng của bạn. Dùng để tính vị trí mắt cho góc nhìn phối cảnh chính xác."
screens_cab_player_distance_hint = "Khoảng cách bạn đứng cách lockbar (trước ra sau). Số âm là phía sau lockbar, số dương là nghiêng người qua nó."
screens_cab_player_offset_hint = "Độ lệch trái/phải của bạn so với tâm cabinet. Để 0 trừ khi bạn đứng lệch sang một bên."
rendering_aa_hint = "Supersampling render bàn ở độ phân giải nội bộ cao hơn rồi thu nhỏ lại, làm mượt các cạnh răng cưa. Trên 1.0 làm sắc nét hình ảnh với chi phí GPU; dưới 1.0 tăng khung hình trên máy yếu."
rendering_msaa_hint = "Khử răng cưa đa mẫu MSAA làm mượt các cạnh hình học như đường dốc và khung dây. Giá trị cao hơn trông sạch hơn nhưng tốn GPU hơn; để tắt nếu supersampling hoặc FXAA đã xử lý răng cưa."
rendering_fxaa_hint = "Khử răng cưa hậu xử lý làm mượt toàn bộ hình ảnh sau khi render, rất nhẹ cho GPU. Các chế độ mạnh hơn làm mượt nhiều cạnh hơn nhưng có thể làm mờ nhẹ mặt bàn; lựa chọn tốt trên phần cứng cấu hình thấp."
rendering_sharpen_hint = "Làm sắc nét bù lại độ mờ do khử răng cưa hoặc supersampling gây ra, khiến các insert và chữ rõ nét hơn. Bật nếu hình ảnh trông hơi mờ; để tắt nếu đã sắc nét."
rendering_reflections_hint = "Điều khiển những gì mặt bàn phản chiếu: bi, các bộ phận tĩnh, hoặc các vật thể động. Càng nhiều phản chiếu trông càng phong phú nhưng tốn GPU; giảm nếu khung hình tụt trên các bàn nhiều chi tiết."
rendering_tex_size_hint = "Giới hạn độ phân giải kết cấu tối đa mà VPX tải. Mặc định (16384) giữ đầy đủ chi tiết; chỉ hạ xuống nếu GPU có bộ nhớ video hạn chế bị hết bộ nhớ hoặc giật."
inputs_pinscape_profile_hint = "Chọn hồ sơ khớp với bo mạch điều khiển pinball của bạn (KL25Z, Pico, DudesCab hoặc PinOne). Nó điền cột cần điều khiển bằng bố cục nút mặc định của hãng cho bo mạch đó. Chọn Không để xóa các mặc định đó và tự ánh xạ từng nút."
inputs_gamepad_hint = "Bật tùy chọn này để dùng tay cầm đã phát hiện cho việc điều hướng PinReady và các thao tác trong trò chơi. Tắt nếu bạn chỉ chơi bằng bàn phím hoặc bộ điều khiển pinball chuyên dụng."
inputs_auto_map_hint = "Đi qua từng thao tác một: nhấn phím hoặc nút tay cầm bạn muốn cho mỗi thao tác. Cách nhanh nhất để thiết lập toàn bộ điều khiển trong một lượt."
inputs_auto_map_skip_hint = "Giữ nguyên gán hiện tại của thao tác này và chuyển sang thao tác tiếp theo."
inputs_auto_map_cancel_hint = "Dừng ánh xạ có hướng dẫn ngay bây giờ. Các gán đã ghi trong lượt này được giữ lại."
inputs_map_hint = "Nhấp, rồi nhấn một phím hoặc nút tay cầm để gán vào thao tác này. Một phím điền vào cột bàn phím, một nút tay cầm điền vào cột cần điều khiển; cả hai có thể cùng tồn tại."
outputs_open_folder_hint = "Mở thư mục nơi DOF tìm cấu hình của nó. Giải nén tệp zip từ trình tạo vào đây, rồi khởi động lại VPX để nó nhận cấu hình."
outputs_dof_disable_hint = "Tắt lại plugin DOF trong VPinballX.ini. Các solenoid, flasher và shaker của bạn sẽ ngừng phản ứng trong trò chơi."
outputs_dof_activate_hint = "Ghi Enable = 1 cho plugin DOF để VPX điều khiển phần cứng đầu ra của bạn. Chỉ hữu ích khi cấu hình DOF đã được tạo và giải nén."
outputs_discover_ack_hint = "Xác nhận bạn hiểu rằng bài kiểm tra sẽ kích hoạt vật lý các solenoid và mô-tơ. Đánh dấu để mở khóa các nút quét và mô phỏng."
outputs_discover_scan_hint = "Tìm các bộ điều khiển đầu ra đã kết nối (Pinscape, v.v.) qua USB để bạn có thể xung từng đầu ra một."
outputs_discover_simulator_hint = "Chạy quy trình khám phá trên một bo mạch giả 22 đầu ra. Cách an toàn để thử giao diện mà không cần phần cứng gắn kèm."
outputs_discover_start_hardware_hint = "Mở bo mạch đã phát hiện và bắt đầu xung các đầu ra để bạn ghi lại chân nào điều khiển thiết bị nào trên cabinet."
outputs_discover_copy_udev_hint = "Sao chép các quy tắc udev vào bảng tạm để bạn dán vào tệp quy tắc cho truy cập HID không cần root."
outputs_discover_pulse_stop_hint = "Dừng vòng lặp xung tự động trên đầu ra hiện tại."
outputs_discover_pulse_start_hint = "Xung lặp lại đầu ra đã chọn để bạn nhận biết nó kích hoạt thiết bị nào trên cabinet."
outputs_discover_replay_hint = "Khởi động lại vòng lặp xung trên đầu ra hiện tại nếu bạn bỏ lỡ thiết bị nào phản ứng."
outputs_discover_prev_hint = "Quay lại số đầu ra trước để kiểm tra và gán nhãn."
outputs_discover_next_hint = "Chuyển sang số đầu ra tiếp theo để kiểm tra và gán nhãn."
outputs_discover_label_hint = "Đặt tên thiết bị được nối vào đầu ra này (ví dụ Flipper trái, Shaker). Các nhãn này tạo nên bản tóm tắt bạn dán vào trình tạo DOF."
outputs_discover_copy_hint = "Sao chép danh sách đánh số các đầu ra đã gán nhãn vào bảng tạm, làm tham chiếu khi điền configtool.vpuniverse.com."
outputs_discover_end_session_hint = "Kết thúc phiên khám phá và xóa các nhãn đầu ra hiện tại. Hãy sao chép bản tóm tắt trước nếu bạn vẫn cần."
audio_device_bg_hint = "Card âm thanh hoặc loa dùng cho nhạc, thoại và âm thanh chung của trò chơi (phía backglass). Để mặc định trừ khi bạn định tuyến chúng tới một đầu ra riêng."
audio_device_pf_hint = "Card âm thanh hoặc loa dùng cho âm thanh cơ học của mặt bàn (flipper, bumper, bi lăn). Với surround hoặc SSF thì đây phải là đầu ra đa kênh."
audio_mode_front_stereo_hint = "Stereo đơn giản với cả hai loa ở phía trước cabinet. Thiết lập đơn giản nhất, không hiệu ứng không gian."
audio_mode_rear_stereo_hint = "Stereo đơn giản với hai loa phía sau mặt bàn, gần lockbar. Dùng nếu loa duy nhất của bạn nằm gần người chơi."
audio_mode_surround_rear_hint = "Surround 5.1 với các kênh sau đặt tại lockbar. Cần card âm thanh 6 kênh."
audio_mode_surround_front_hint = "Surround 5.1 với các kênh trước đặt tại lockbar. Chọn cái khớp với cách loa của bạn được nối vật lý."
audio_mode_ssf_legacy_hint = "Surround Sound Feedback với cách trộn cũ hơn. SSF dùng các exciter trên mặt bàn để âm thanh nghe như phát ra từ bi; hãy thử biến thể Mới trước."
audio_mode_ssf_new_hint = "Surround Sound Feedback với cách trộn mới hơn, được khuyến nghị. Đắm chìm tốt nhất trên cabinet SSF đầy đủ với exciter 7.1."
audio_music_volume_hint = "Mức tổng thể của nhạc, thoại và âm thanh trò chơi trên đầu ra backglass (MusicVolume của VPX)."
audio_sound_volume_hint = "Mức âm thanh cơ học của mặt bàn trên đầu ra mặt bàn (SoundVolume của VPX)."
audio_test_music_btn_hint = "Phát một bản nhạc lặp trên thiết bị backglass để bạn kiểm tra nó nghe được và nối trái/phải đúng."
audio_pan_hint = "Kéo để dịch nhạc thử giữa loa backglass trái và phải, xác nhận chúng không bị đảo."
audio_speaker_test_hint = "Phát âm thanh thử chỉ trên loa này, để bạn xác nhận nó được nối vào đúng góc tương ứng của cabinet."
audio_ball_top_bottom_hint = "Quét âm thanh bi lăn từ các loa trước tới lockbar. Nếu chuyển động thấy ngược, hãy đổi chế độ đầu ra ở trên."
audio_ball_left_right_hint = "Quét âm thanh bi lăn từ các loa trái sang phải. Nếu hướng sai, hãy kiểm tra dây nối trái/phải của bạn."
tables_dir_path_hint = "Thư mục gốc chứa mỗi bàn một thư mục con (bố cục một thư mục cho mỗi bàn của VPX 10.8). PinReady quét nó để dựng danh sách bàn của bạn."
tables_dir_browse_hint = "Mở trình chọn thư mục để chọn thư mục tables của bạn thay vì gõ đường dẫn bằng tay."
tables_dir_merge_vpinmame_hint = "Thư mục VPinMAME hiện có (roms, nvram, cfg…). Các tệp của nó được nhập vào thư mục pinmame của mỗi bàn khớp. Để trống nếu bạn không có."
tables_dir_merge_pupvideos_hint = "Thư mục pupvideos của PinUP Player hiện có. Các video khớp được nhập vào thư mục pupvideos của mỗi bàn. Để trống nếu không dùng."
tables_dir_merge_music_hint = "Thư mục nhạc hiện có. Các bản nhạc khớp được nhập vào thư mục music của mỗi bàn. Để trống nếu không dùng."
tables_dir_merge_strategy_copy_hint = "Nhân đôi các tệp nguồn vào thư mục tables của bạn và giữ lại bản gốc. Lựa chọn an toàn nhất, nhưng dùng nhiều dung lượng đĩa nhất."
tables_dir_merge_strategy_move_hint = "Di chuyển các tệp vào thư mục tables của bạn và xóa chúng khỏi nguồn. Tiết kiệm dung lượng đĩa nhưng làm rỗng các thư mục gốc."
tables_dir_merge_strategy_symlink_hint = "Tạo các liên kết trỏ tới bản gốc thay vì sao chép. Gần như không dùng dung lượng đĩa, nhưng các thư mục nguồn phải giữ nguyên vị trí."
tables_dir_merge_dry_run_hint = "Quét các nguồn và liệt kê những gì sẽ được nhập, mà không thay đổi tệp nào. Chạy cái này trước để xem trước kết quả."
tables_dir_merge_apply_hint = "Thực hiện việc nhập thật sự, dùng kế hoạch từ lần chạy thử. Các tệp được sao chép, di chuyển hoặc liên kết theo chiến lược bạn đã chọn."
tables_dir_merge_cancel_hint = "Dừng việc nhập đang tiến hành. Các tệp đã nhập được giữ lại."
system_mirror_clear_hint = "Xóa URL mirror tự lưu trữ và khôi phục tải trực tiếp từ GitHub. Dùng cái này nếu mirror ngoại tuyến hoặc bạn không còn chạy nó nữa."
