screens_vpx_install_button_hint = "Pobierz wersję pokazaną powyżej i zainstaluj ją w folderze poniżej."
screens_vpx_browse_dir_hint = "Wybierz folder, w którym zostanie zainstalowany Visual Pinball X."
screens_vpx_manual_hint = "Użyj Visual Pinball X, który sam już zainstalowałeś, zamiast pobierać nowy."
screens_vpx_exe_hint = "Ścieżka do twojego istniejącego pliku wykonywalnego VPinballX_BGFX."
screens_vpx_browse_exe_hint = "Zlokalizuj plik wykonywalny VPinballX_BGFX na swoim dysku."
screens_count_hint = "Ile ekranów wykorzystuje twoja konfiguracja. Komputer stacjonarny to zwykle 1; pełny pincab to 3 lub 4 (playfield, backglass, DMD i opcjonalny topper)."
screens_mode_desktop_hint = "Widok jednoekranowy dla zwykłego monitora komputerowego. Stół jest pokazywany pod standardowym kątem od przodu."
screens_mode_cabinet_hint = "Widok cabinetu dla prawdziwego pincaba: playfield jest renderowany dla ekranu położonego płasko, z backglass i DMD na osobnych ekranach."
screens_mode_fss_hint = "Full Single Screen: playfield i backglass ułożone na jednym wysokim ekranie. Używaj tego, gdy masz jeden ekran w orientacji pionowej."
screens_disable_touch_hint = "Wyłącz nakładkę dotykową VPX na ekranie. Włącz to na pincabie, którego playfield jest ekranem bez dotyku."
screens_physical_size_hint = "Fizyczna szerokość i wysokość tego ekranu w milimetrach. VPX używa jej do skalowania stołu do rzeczywistego rozmiaru; wypełniane automatycznie z EDID monitora, gdy dostępne."
screens_role_hint = "Co ten ekran pokazuje w VPX: Playfield, Backglass, DMD lub Topper. Pozostaw jako Nieużywany, aby zignorować ekran."
screens_cab_lockbar_width_hint = "Szerokość lockbara cabinetu (przedniej belki). Używana do skalowania kuli na ekranie do rzeczywistego rozmiaru twojego cabinetu."
screens_cab_lockbar_height_hint = "Wysokość lockbara nad podłogą. W połączeniu z wysokością twoich oczu ustala kąt patrzenia na playfield."
screens_cab_inclination_hint = "Kąt nachylenia ekranu playfield. Dopasuj go do rzeczywistego nachylenia szyby playfield twojego cabinetu."
screens_cab_player_height_hint = "Twój wzrost na stojąco. Używany do obliczenia pozycji twoich oczu dla poprawnej perspektywy."
screens_cab_player_distance_hint = "Jak daleko stoisz od lockbara (od przodu do tyłu). Wartość ujemna to za lockbarem, dodatnia to pochylenie się nad nim."
screens_cab_player_offset_hint = "Twoje przesunięcie w lewo/prawo od środka cabinetu. Pozostaw na 0, chyba że stoisz z boku."
rendering_aa_hint = "Supersampling renderuje stół w wyższej wewnętrznej rozdzielczości i skaluje go w dół, wygładzając poszarpane krawędzie. Powyżej 1.0 wyostrza obraz kosztem GPU; poniżej 1.0 podnosi liczbę klatek na słabszych maszynach."
rendering_msaa_hint = "Antyaliasing wielopróbkowy (MSAA) wygładza krawędzie geometrii, takie jak rampy i konstrukcje z drutu. Wyższe wartości wyglądają czyściej, ale bardziej obciążają GPU; pozostaw wyłączone, jeśli supersampling lub FXAA już radzi sobie z aliasingiem."
rendering_fxaa_hint = "Antyaliasing w postprocessingu wygładza cały obraz po renderowaniu, bardzo tani dla GPU. Silniejsze tryby wygładzają więcej krawędzi, ale mogą lekko rozmyć playfield; dobry wybór na słabszym sprzęcie."
rendering_sharpen_hint = "Wyostrzanie kompensuje zmiękczenie spowodowane antyaliasingiem lub supersamplingiem, czyniąc inserty i tekst ostrzejszymi. Włącz je, jeśli obraz wygląda na lekko rozmyty; pozostaw wyłączone, jeśli już wygląda ostro."
rendering_reflections_hint = "Kontroluje, co odbija playfield: kulę, elementy statyczne lub obiekty dynamiczne. Więcej odbić wygląda bogaciej, ale kosztuje GPU; zmniejsz to, jeśli liczba klatek spada na obciążonych stołach."
rendering_tex_size_hint = "Ogranicza maksymalną rozdzielczość tekstur ładowanych przez VPX. Wartość domyślna (16384) zachowuje pełny detal; obniż ją tylko, jeśli GPU z ograniczoną pamięcią wideo wyczerpuje pamięć lub się zacina."
inputs_pinscape_profile_hint = "Wybierz profil pasujący do twojej płytki kontrolera flippera (KL25Z, Pico, DudesCab lub PinOne). Wypełnia on kolumnę joysticka fabrycznym układem przycisków tej płytki. Wybierz Brak, aby wyczyścić te domyślne wartości i zmapować każdy przycisk samodzielnie."
inputs_gamepad_hint = "Włącz to, aby używać wykrytego pada do nawigacji po PinReady i do akcji w grze. Wyłącz, jeśli grasz wyłącznie klawiaturą lub dedykowanym kontrolerem flippera."
inputs_auto_map_hint = "Przejdź przez każdą akcję po kolei: naciśnij klawisz lub przycisk kontrolera, który chcesz dla każdej z nich. Najszybszy sposób na skonfigurowanie wszystkich sterowań za jednym razem."
inputs_auto_map_skip_hint = "Zachowaj bieżące przypisanie tej akcji bez zmian i przejdź do następnej."
inputs_auto_map_cancel_hint = "Zatrzymaj prowadzone mapowanie teraz. Przypisania już zarejestrowane w tym przejściu zostaną zachowane."
inputs_map_hint = "Kliknij, a następnie naciśnij klawisz lub przycisk kontrolera, aby przypisać go do tej akcji. Klawisz wypełnia kolumnę klawiatury, przycisk kontrolera wypełnia kolumnę joysticka; oba mogą współistnieć."
outputs_open_folder_hint = "Otwiera folder, w którym DOF szuka swojej konfiguracji. Rozpakuj tu zip z generatora, a następnie zrestartuj VPX, aby wczytał konfigurację."
outputs_dof_disable_hint = "Ponownie wyłącza wtyczkę DOF w VPinballX.ini. Twoje solenoidy, flashery i shakery przestaną reagować w grze."
outputs_dof_activate_hint = "Zapisuje Enable = 1 dla wtyczki DOF, aby VPX sterował twoim sprzętem wyjściowym. Przydatne dopiero po wygenerowaniu i rozpakowaniu konfiguracji DOF."
outputs_discover_ack_hint = "Potwierdza, że rozumiesz, iż test fizycznie uruchamia solenoidy i silniki. Zaznacz, aby odblokować przyciski skanowania i symulatora."
outputs_discover_scan_hint = "Szuka podłączonych kontrolerów wyjścia (Pinscape itd.) przez USB, abyś mógł pojedynczo pulsować ich wyjściami."
outputs_discover_simulator_hint = "Uruchamia proces wykrywania na fikcyjnej płytce z 22 wyjściami. Bezpieczny sposób na wypróbowanie interfejsu bez podłączonego sprzętu."
outputs_discover_start_hardware_hint = "Otwiera wykrytą płytkę i zaczyna pulsować jej wyjściami, abyś mógł zanotować, który pin steruje którym urządzeniem w cabinecie."
outputs_discover_copy_udev_hint = "Kopiuje reguły udev do schowka, abyś mógł wkleić je do pliku reguł dla dostępu HID bez roota."
outputs_discover_pulse_stop_hint = "Zatrzymuje pętlę automatycznego pulsowania na bieżącym wyjściu."
outputs_discover_pulse_start_hint = "Wielokrotnie pulsuje wybranym wyjściem, abyś mógł rozpoznać, które urządzenie wyzwala ono w cabinecie."
outputs_discover_replay_hint = "Ponownie uruchamia pętlę pulsowania na bieżącym wyjściu, jeśli przegapiłeś, które urządzenie zareagowało."
outputs_discover_prev_hint = "Wraca do poprzedniego numeru wyjścia, aby je przetestować i oznaczyć."
outputs_discover_next_hint = "Przechodzi do następnego numeru wyjścia, aby je przetestować i oznaczyć."
outputs_discover_label_hint = "Nazwij urządzenie podłączone do tego wyjścia (np. Lewy flipper, Shaker). Te etykiety tworzą podsumowanie, które wklejasz do generatora DOF."
outputs_discover_copy_hint = "Kopiuje ponumerowaną listę twoich oznaczonych wyjść do schowka, jako odniesienie przy wypełnianiu configtool.vpuniverse.com."
outputs_discover_end_session_hint = "Kończy sesję wykrywania i czyści bieżące etykiety wyjść. Najpierw skopiuj podsumowanie, jeśli nadal go potrzebujesz."
audio_device_bg_hint = "Karta dźwiękowa lub głośniki używane do muzyki, zapowiedzi i ogólnych dźwięków gry (strona backglass). Pozostaw na domyślnym, chyba że kierujesz te dźwięki na osobne wyjście."
audio_device_pf_hint = "Karta dźwiękowa lub głośniki używane do mechanicznych dźwięków playfield (flippery, bumpery, toczenie kuli). Dla surround lub SSF musi to być wyjście wielokanałowe."
audio_mode_front_stereo_hint = "Zwykłe stereo z oboma głośnikami z przodu cabinetu. Najprostsza konfiguracja, bez efektów przestrzennych."
audio_mode_rear_stereo_hint = "Zwykłe stereo z dwoma głośnikami za playfieldem, blisko lockbara. Użyj tego, jeśli twoje jedyne głośniki znajdują się blisko gracza."
audio_mode_surround_rear_hint = "Surround 5.1 z kanałami tylnymi umieszczonymi przy lockbarze. Wymaga 6-kanałowej karty dźwiękowej."
audio_mode_surround_front_hint = "Surround 5.1 z kanałami przednimi umieszczonymi przy lockbarze. Wybierz ten, który odpowiada fizycznemu okablowaniu twoich głośników."
audio_mode_ssf_legacy_hint = "Surround Sound Feedback ze starszym miksem. SSF używa exciterów na playfieldzie, aby dźwięki zdawały się pochodzić od kuli; wypróbuj najpierw wariant Nowy."
audio_mode_ssf_new_hint = "Surround Sound Feedback z nowszym, zalecanym miksem. Najlepsze zanurzenie na pełnym cabinecie SSF z exciterami 7.1."
audio_music_volume_hint = "Ogólny poziom muzyki, zapowiedzi i dźwięków gry na wyjściu backglass (MusicVolume w VPX)."
audio_sound_volume_hint = "Poziom mechanicznych dźwięków playfield na wyjściu playfield (SoundVolume w VPX)."
audio_test_music_btn_hint = "Odtwarza zapętloną muzykę na urządzeniu backglass, abyś mógł sprawdzić, czy jest słyszalna i poprawnie okablowana lewo/prawo."
audio_pan_hint = "Przeciągnij, aby przesunąć muzykę testową między lewym a prawym głośnikiem backglass, potwierdzając, że nie są zamienione."
audio_speaker_test_hint = "Odtwarza dźwięk testowy tylko na tym głośniku, abyś mógł potwierdzić, że jest podłączony do odpowiedniego rogu cabinetu."
audio_ball_top_bottom_hint = "Przesuwa dźwięk toczącej się kuli z głośników przednich do lockbara. Jeśli ruch wydaje się odwrócony, zmień tryb wyjścia powyżej."
audio_ball_left_right_hint = "Przesuwa dźwięk toczącej się kuli z głośników lewych do prawych. Jeśli kierunek jest błędny, sprawdź swoje okablowanie lewo/prawo."
tables_dir_path_hint = "Główny folder zawierający jeden podfolder na stół (układ „jeden folder na stół” z VPX 10.8). PinReady skanuje go, aby zbudować twoją listę stołów."
tables_dir_browse_hint = "Otwórz okno wyboru folderu, aby wskazać katalog stołów zamiast ręcznego wpisywania ścieżki."
tables_dir_merge_vpinmame_hint = "Istniejący folder VPinMAME (roms, nvram, cfg…). Jego pliki są importowane do folderu pinmame każdego pasującego stołu. Pozostaw puste, jeśli go nie masz."
tables_dir_merge_pupvideos_hint = "Istniejący folder pupvideos z PinUP Player. Pasujące filmy są importowane do folderu pupvideos każdego stołu. Pozostaw puste, jeśli nieużywany."
tables_dir_merge_music_hint = "Istniejący folder z muzyką. Pasujące utwory są importowane do folderu music każdego stołu. Pozostaw puste, jeśli nieużywany."
tables_dir_merge_strategy_copy_hint = "Powiela pliki źródłowe do twojego katalogu stołów i zachowuje oryginały. Najbezpieczniejszy wybór, ale zajmuje najwięcej miejsca na dysku."
tables_dir_merge_strategy_move_hint = "Przenosi pliki do twojego katalogu stołów i usuwa je ze źródła. Oszczędza miejsce na dysku, ale opróżnia oryginalne foldery."
tables_dir_merge_strategy_symlink_hint = "Tworzy dowiązania wskazujące oryginały zamiast kopiować. Nie zajmuje prawie żadnego miejsca na dysku, ale foldery źródłowe muszą pozostać na miejscu."
tables_dir_merge_dry_run_hint = "Skanuje źródła i wypisuje, co zostałoby zaimportowane, bez zmieniania żadnych plików. Uruchom to najpierw, aby podejrzeć wynik."
tables_dir_merge_apply_hint = "Wykonuje import naprawdę, korzystając z planu z suchego przebiegu. Pliki są kopiowane, przenoszone lub dowiązywane zgodnie z wybraną strategią."
tables_dir_merge_cancel_hint = "Zatrzymuje trwający import. Pliki już zaimportowane zostają zachowane."
system_mirror_clear_hint = "Czyści adres URL własnego mirrora i przywraca bezpośrednie pobieranie z GitHub. Użyj tego, jeśli mirror jest offline lub już go nie prowadzisz."
