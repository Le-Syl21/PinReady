screens_disable_touch_hint = "VPX の画面上のタッチオーバーレイをオフにします。プレイフィールドが非タッチ画面のピンキャブで有効にしてください — 特に、台をリモート操作している場合（RustDesk、VNC、TeamViewer…）は有効にしてください。そうしないと、遠隔のポインターがタッチ入力と誤認され、VPX で意図しない操作を引き起こすことがあります。"
screens_physical_size_hint = "この画面の物理的な幅と高さ（ミリメートル）。VPX がテーブルを実物大にスケールするために使用します。利用可能な場合はモニターの EDID から自動入力されます。"
screens_role_hint = "この画面が VPX で表示する内容: プレイフィールド、バックグラス、DMD、またはトッパー。画面を無視するには未使用のままにします。"
screens_cab_lockbar_width_hint = "キャビネットのロックバー（前面のレール）の幅。画面上のボールをキャビネットの実寸に合わせてスケールするために使用します。"
screens_cab_lockbar_height_hint = "床からのロックバーの高さ。目線の高さと組み合わせて、プレイフィールドへの視野角を設定します。"
screens_cab_inclination_hint = "プレイフィールド画面の傾斜角。キャビネットのプレイフィールドガラスの実際の傾斜に合わせてください。"
screens_cab_player_height_hint = "立ったときのあなたの身長。正しい遠近感のために目の位置を計算するために使用します。"
screens_cab_player_distance_hint = "ロックバーからの立ち位置の距離（前後方向）。マイナスはロックバーの後ろ、プラスはロックバーに身を乗り出した位置です。"
screens_cab_player_offset_hint = "キャビネット中央からの左右のずれ。片側に寄って立つのでなければ 0 のままにします。"
rendering_aa_hint = "スーパーサンプリングはテーブルをより高い内部解像度でレンダリングして縮小し、ギザギザのエッジを滑らかにします。1.0 を超えると GPU 負荷と引き換えに画像がシャープになり、1.0 未満だと非力なマシンでフレームレートが向上します。"
rendering_msaa_hint = "マルチサンプルアンチエイリアスは、ランプやワイヤーフォームなどのジオメトリのエッジを滑らかにします。値を高くするときれいに見えますが GPU 負荷が増えます。スーパーサンプリングや FXAA ですでにエイリアシングに対処している場合はオフにしてください。"
rendering_fxaa_hint = "ポストプロセスアンチエイリアスはレンダリング後に画像全体を滑らかにし、GPU 負荷は非常に軽微です。強いモードほど多くのエッジを滑らかにしますが、プレイフィールドがわずかにぼやけることがあります。ローエンドのハードウェアに適した選択肢です。"
rendering_sharpen_hint = "シャープ化はアンチエイリアスやスーパーサンプリングによるぼやけを打ち消し、インサートやテキストをくっきりさせます。画像が少しぼやけて見える場合は有効にし、すでにシャープなら無効のままにします。"
rendering_reflections_hint = "プレイフィールドが反射する対象を制御します: ボール、静的パーツ、または動的オブジェクト。反射を増やすと見た目は豊かになりますが GPU 負荷がかかります。にぎやかなテーブルでフレームレートが低下する場合は減らしてください。"
rendering_tex_size_hint = "VPX が読み込むテクスチャの最大解像度を制限します。既定値（16384）は完全なディテールを保ちます。ビデオメモリの少ない GPU でメモリ不足やカクつきが起きる場合のみ下げてください。"
inputs_pinscape_profile_hint = "お使いのピンボールコントローラーボード（KL25Z、Pico、DudesCab、PinOne）に合ったプロファイルを選びます。ジョイスティック列にそのボードの工場出荷時のボタン配置が入力されます。これらの既定値を消してすべてのボタンを自分でマッピングするには「なし」を選択します。"
inputs_gamepad_hint = "検出されたゲームパッドを PinReady のナビゲーションとゲーム中の操作に使用するには有効にします。キーボードや専用のピンボールコントローラーだけでプレイする場合はオフにしてください。"
inputs_auto_map_hint = "各アクションを 1 つずつ順に進めます: それぞれに割り当てたいキーまたはコントローラーのボタンを押します。すべての操作を一度に設定する最速の方法です。"
inputs_auto_map_skip_hint = "このアクションの現在の割り当てを変更せずに、次へ進みます。"
inputs_auto_map_cancel_hint = "ガイド付きマッピングを今すぐ停止します。この工程ですでにキャプチャされた割り当ては保持されます。"
inputs_map_hint = "クリックしてから、キーまたはコントローラーのボタンを押すと、このアクションに割り当てられます。キーはキーボード列に、コントローラーのボタンはジョイスティック列に入力されます。両方を併用できます。"
outputs_open_folder_hint = "DOF が設定を探すフォルダーを開きます。ジェネレーターからの zip をここに展開し、VPX を再起動して設定を読み込ませてください。"
outputs_dof_disable_hint = "VPinballX.ini で DOF プラグインを再びオフにします。ソレノイド、フラッシャー、シェイカーがゲーム中に反応しなくなります。"
outputs_dof_activate_hint = "DOF プラグインに Enable = 1 を書き込み、VPX が出力ハードウェアを駆動するようにします。DOF 設定を生成して展開した後にのみ有効です。"
outputs_discover_ack_hint = "テストがソレノイドやモーターを物理的に作動させることを理解したことを確認します。チェックするとスキャンとシミュレーターのボタンがロック解除されます。"
outputs_discover_scan_hint = "USB 経由で接続された出力コントローラー（Pinscape など）を探し、その出力を 1 つずつパルスできるようにします。"
outputs_discover_simulator_hint = "架空の 22 出力ボードに対してディスカバリーフローを実行します。ハードウェアを接続せずにインターフェースを試す安全な方法です。"
outputs_discover_start_hardware_hint = "検出されたボードを開き、その出力のパルスを開始して、どのピンがキャビネットのどのデバイスを駆動しているかを確認できるようにします。"
outputs_discover_copy_udev_hint = "udev ルールをクリップボードにコピーし、root なしで HID にアクセスするためのルールファイルに貼り付けられるようにします。"
outputs_discover_pulse_stop_hint = "現在の出力での自動パルスループを停止します。"
outputs_discover_pulse_start_hint = "選択した出力を繰り返しパルスして、キャビネットのどのデバイスを作動させるかを見つけられるようにします。"
outputs_discover_replay_hint = "どのデバイスが反応したか見逃した場合に、現在の出力のパルスループを再開します。"
outputs_discover_prev_hint = "前の出力番号に戻って、テストとラベル付けを行います。"
outputs_discover_next_hint = "次の出力番号に進んで、テストとラベル付けを行います。"
outputs_discover_label_hint = "この出力に配線されたデバイスに名前を付けます（例: 左フリッパー、シェイカー）。これらのラベルは DOF ジェネレーターに貼り付ける概要を構成します。"
outputs_discover_copy_hint = "ラベル付けした出力の番号付きリストをクリップボードにコピーし、configtool.vpuniverse.com への入力時の参照にします。"
outputs_discover_end_session_hint = "ディスカバリーセッションを終了し、現在の出力ラベルをクリアします。まだ必要な場合は先に概要をコピーしてください。"
audio_device_bg_hint = "音楽、コールアウト、一般的なゲームサウンド（バックグラス側）に使用するサウンドカードまたはスピーカー。これらを別の出力にルーティングするのでなければ、既定のままにしてください。"
audio_device_pf_hint = "プレイフィールドの機械的なサウンド（フリッパー、バンパー、ボールの転がり）に使用するサウンドカードまたはスピーカー。サラウンドや SSF の場合は、これがマルチチャンネル出力である必要があります。"
audio_mode_front_stereo_hint = "両方のスピーカーをキャビネットの前面に配置した通常のステレオ。最もシンプルな構成で、空間効果はありません。"
audio_mode_rear_stereo_hint = "2 つのスピーカーをプレイフィールドの後ろ、ロックバー付近に配置した通常のステレオ。唯一のスピーカーがプレイヤーの近くにある場合に使用します。"
audio_mode_surround_rear_hint = "リアチャンネルをロックバーに配置した 5.1 サラウンド。6 チャンネルのサウンドカードが必要です。"
audio_mode_surround_front_hint = "フロントチャンネルをロックバーに配置した 5.1 サラウンド。スピーカーの物理的な配線に合ったものを選んでください。"
audio_mode_ssf_legacy_hint = "旧式のミキシングによる Surround Sound Feedback。SSF はプレイフィールドのエキサイターを使用し、サウンドがボールから聞こえるように感じさせます。まず New バリアントを試してください。"
audio_mode_ssf_new_hint = "より新しい推奨のミキシングによる Surround Sound Feedback。7.1 エキサイターを備えたフル SSF キャビネットで最高の没入感が得られます。"
audio_music_volume_hint = "バックグラス出力での音楽、コールアウト、ゲームサウンドの全体的なレベル（VPX MusicVolume）。"
audio_sound_volume_hint = "プレイフィールド出力でのプレイフィールドの機械的なサウンドのレベル（VPX SoundVolume）。"
audio_test_music_btn_hint = "バックグラスデバイスで音楽トラックをループ再生し、聞こえるか、左右が正しく配線されているかを確認できるようにします。"
audio_pan_hint = "ドラッグしてテスト音楽を左右のバックグラススピーカー間で移動させ、左右が入れ替わっていないか確認します。"
audio_speaker_test_hint = "このスピーカーだけでテスト音を再生し、キャビネットの対応する角に配線されているか確認できるようにします。"
audio_ball_top_bottom_hint = "ボールが転がる音を前面のスピーカーからロックバーへとスイープさせます。動きが逆に感じる場合は、上の出力モードを切り替えてください。"
audio_ball_left_right_hint = "ボールが転がる音を左のスピーカーから右へとスイープさせます。方向が誤っている場合は、左右の配線を確認してください。"
tables_dir_path_hint = "テーブルごとに 1 つのサブフォルダーを持つルートフォルダー（VPX 10.8 のテーブルごとフォルダー構成）。PinReady はこれをスキャンしてテーブルリストを作成します。"
tables_dir_browse_hint = "パスを手入力する代わりに、フォルダー選択ダイアログを開いてテーブルディレクトリを選択します。"
tables_dir_merge_vpinmame_hint = "既存の VPinMAME フォルダー（roms、nvram、cfg…）。そのファイルは一致する各テーブルの pinmame フォルダーにインポートされます。ない場合は空のままにします。"
tables_dir_merge_pupvideos_hint = "既存の PinUP Player の pupvideos フォルダー。一致する動画は各テーブルの pupvideos フォルダーにインポートされます。使用しない場合は空のままにします。"
tables_dir_merge_music_hint = "既存の音楽フォルダー。一致するトラックは各テーブルの music フォルダーにインポートされます。使用しない場合は空のままにします。"
tables_dir_merge_strategy_copy_hint = "ソースファイルをテーブルディレクトリに複製し、元のファイルを保持します。最も安全な選択肢ですが、ディスク容量を最も多く使用します。"
tables_dir_merge_strategy_move_hint = "ファイルをテーブルディレクトリに移動し、ソースから削除します。ディスク容量を節約しますが、元のフォルダーは空になります。"
tables_dir_merge_strategy_symlink_hint = "コピーする代わりに元のファイルを指すリンクを作成します。ディスク容量はほとんど使用しませんが、ソースフォルダーはそのままの場所に残しておく必要があります。"
tables_dir_merge_dry_run_hint = "ソースをスキャンし、インポートされる内容を一覧表示しますが、ファイルは変更しません。まずこれを実行して結果をプレビューしてください。"
tables_dir_merge_apply_hint = "ドライランの計画に基づいて、実際にインポートを実行します。選択した方式に従って、ファイルがコピー、移動、またはリンクされます。"
tables_dir_merge_cancel_hint = "現在進行中のインポートを停止します。すでにインポートされたファイルは保持されます。"
system_mirror_clear_hint = "自己ホスト型ミラーの URL をクリアし、GitHub からの直接ダウンロードに戻します。ミラーがオフラインの場合や、もう運用していない場合に使用してください。"
